# docker-compose.yml
#
# Multi-cluster support (Phase 17.4):
# - AGENTX_CLUSTER_NAME: Unique cluster identifier (default: agent)
# - AGENTX_DATA_DIR: Data directory for databases (default: ./data)
# - Ports are configurable via env vars for running multiple clusters

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: ${AGENTX_CLUSTER_NAME:-agent}-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"  # Browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      # Memory settings - adjust based on your system
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - ${AGENTX_DATA_DIR:-./data}/neo4j/data:/data
      - ${AGENTX_DATA_DIR:-./data}/neo4j/logs:/logs
      - ${AGENTX_DATA_DIR:-./data}/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${AGENTX_CLUSTER_NAME:-agent}-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-agent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-agent_memory}
    volumes:
      - ${AGENTX_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./queries:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agent_memory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${AGENTX_CLUSTER_NAME:-agent}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ${AGENTX_DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AgentX API Server (Phase 17)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${AGENTX_CLUSTER_NAME:-agent}-api
    ports:
      - "${API_PORT:-12319}:12319"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allows access to localhost services
      - "lmstudio:192.168.8.181" # Bypass for LAN LMS host
    environment:
      # Cluster identity
      - AGENTX_CLUSTER_NAME=${AGENTX_CLUSTER_NAME:-default}
      # Django settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      # Database connections (internal Docker network)
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - POSTGRES_URI=postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-agent_memory}
      - REDIS_URI=redis://redis:6379
      # Authentication settings
      - AGENTX_AUTH_ENABLED=${AGENTX_AUTH_ENABLED:-true}
      - AGENTX_SESSION_TTL=${AGENTX_SESSION_TTL:-86400}
      # CORS/CSRF for production (Cloudflare Tunnel)
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # Provider API keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY:-}
      # Embedding configuration
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
    volumes:
      - ${AGENTX_DATA_DIR:-./data}:/app/data
      - ./mcp_servers.json:/app/mcp_servers.json:ro
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12319/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    profiles:
      - production

  # Optional: Redis GUI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ${AGENTX_CLUSTER_NAME:-agent}-redis-gui
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    profiles:
      - tools

# Volumes section removed - using local bind mounts instead
# See ./data/ directory for database storage
