# ============================================================================
# AgentX Taskfile
# ============================================================================
# A comprehensive task runner for the AgentX AI Agent Platform.
#
# Usage:
#   task              - Show available tasks
#   task dev          - Start full development environment
#   task --list-all   - List all tasks including internal ones
#
# Groups:
#   dev:*      - Development workflow commands
#   api:*      - Django API server commands
#   client:*   - Tauri/React client commands
#   db:*       - Database management (Docker services)
#   mcp:*      - MCP server inspection tools
#   docs:*     - Documentation commands
#   clean:*    - Cleanup and reset commands
#   check:*    - Environment checks and static analysis
# ============================================================================

version: '3'

vars:
  # Platform detection
  OS: '{{if eq OS "windows"}}windows{{else if eq OS "darwin"}}macos{{else}}linux{{end}}'
  
  # App data paths by platform
  APP_DATA_LINUX: "~/.local/share/agentx"
  APP_DATA_MACOS: "~/Library/Application Support/agentx"
  APP_DATA_WINDOWS: "%APPDATA%\\agentx"
  
  # Tauri app identifier (used for locating app data)
  TAURI_BUNDLE_ID: "com.agentx.app"

# ============================================================================
# DEFAULT & SETUP
# ============================================================================

tasks:
  default:
    desc: "Show available tasks"
    silent: true
    cmds:
      - task --list

  setup:
    desc: "First-time setup: install deps, init databases, verify environment"
    cmds:
      - task: install
      - task: db:init
      - task: check
    
  check:
    desc: "Verify development environment is ready"
    silent: true
    cmds:
      - echo "🔍 Checking development environment..."
      - |
        MISSING=""
        WARNINGS=""

        # Check data directories
        [ ! -d "data/postgres" ] && MISSING="${MISSING}\n  ✗ data/postgres/ (run: task db:init)"
        [ ! -d "data/neo4j" ] && MISSING="${MISSING}\n  ✗ data/neo4j/ (run: task db:init)"
        [ ! -d "data/redis" ] && MISSING="${MISSING}\n  ✗ data/redis/ (run: task db:init)"

        # Check dependencies
        [ ! -d ".venv" ] && MISSING="${MISSING}\n  ✗ .venv/ (run: task install)"
        [ ! -d "client/node_modules" ] && MISSING="${MISSING}\n  ✗ client/node_modules/ (run: task install)"

        # Check optional files
        [ ! -f ".env" ] && WARNINGS="${WARNINGS}\n  ⚠ .env not found (copy from .env.example)"
        [ ! -f "mcp_servers.json" ] && WARNINGS="${WARNINGS}\n  ⚠ mcp_servers.json not found (copy from mcp_servers.json.example)"

        # Report
        if [ -n "$MISSING" ]; then
          echo -e "❌ Missing required components:$MISSING"
          echo ""
          echo "Run 'task setup' to initialize everything."
          exit 1
        fi

        if [ -n "$WARNINGS" ]; then
          echo -e "⚠️  Optional configs missing:$WARNINGS"
          echo ""
        fi

        echo "✅ Development environment is ready!"

# ============================================================================
# DEVELOPMENT WORKFLOW
# ============================================================================

  dev:
    desc: "Start full dev environment (Docker + API + Client)"
    deps: [check, db:up]
    cmds:
      - defer: { task: db:down }
      - bunx concurrently -n "API,CLIENT" -c "blue.bold,magenta.bold"
          "cd api && uv run uvicorn agentx_api.asgi:application --host 127.0.0.1 --port 12319 --reload"
          "cd client && bun run tauri dev"

  dev:api:
    desc: "Start only the API server (assumes Docker running)"
    dir: api
    cmds:
      - uv run uvicorn agentx_api.asgi:application --host 127.0.0.1 --port 12319 --reload

  dev:client:
    desc: "Start only the Tauri client (assumes API running)"
    dir: client
    cmds:
      - bun run tauri dev

  dev:web:
    desc: "Start client in browser mode (no Tauri, port 1420)"
    dir: client
    cmds:
      - bun run dev

# ============================================================================
# INSTALLATION
# ============================================================================

  install:
    desc: "Install all dependencies (API + Client)"
    cmds:
      - echo "📦 Installing dependencies..."
      - bun install -g concurrently
      - task: install:api
      - task: install:client
      - echo "✅ All dependencies installed!"

  install:api:
    desc: "Install Python dependencies via uv"
    cmds:
      - uv sync

  install:client:
    desc: "Install Node dependencies via bun"
    dir: client
    cmds:
      - bun install

# ============================================================================
# API SERVER
# ============================================================================

  api:run:
    desc: "Run Django API server (uvicorn ASGI)"
    aliases: [api:runserver]
    dir: api
    cmds:
      - uv run uvicorn agentx_api.asgi:application --host 127.0.0.1 --port 12319 --reload

  api:shell:
    desc: "Open Django interactive shell"
    dir: api
    cmds:
      - uv run python manage.py shell

  api:migrate:
    desc: "Apply database migrations"
    dir: api
    cmds:
      - uv run python manage.py migrate

  api:makemigrations:
    desc: "Create new migrations from model changes"
    dir: api
    cmds:
      - uv run python manage.py makemigrations

# ============================================================================
# CLIENT
# ============================================================================

  client:dev:
    desc: "Run Tauri app in development mode"
    dir: client
    cmds:
      - bun run tauri dev

  client:build:
    desc: "Build Tauri app for production"
    dir: client
    cmds:
      - bun run tauri build

  client:preview:
    desc: "Preview production web build (no Tauri)"
    deps: [client:build:web]
    dir: client
    cmds:
      - bun run preview

  client:build:web:
    desc: "Build web assets only (no Tauri packaging)"
    dir: client
    cmds:
      - bun run build

# ============================================================================
# TESTING
# ============================================================================

  test:
    desc: "Run all backend tests"
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py test agentx_ai.tests agentx_ai.tests_memory -v2

  test:quick:
    desc: "Run tests without model loading (faster)"
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py test agentx_ai.tests.HealthCheckTest agentx_ai.tests.MCPClientTest agentx_ai.tests.MCPServerRegistryTest -v2

# ============================================================================
# DATABASE SERVICES (Docker)
# ============================================================================

  db:up:
    desc: "Start database services (Neo4j, PostgreSQL, Redis)"
    aliases: [runners]
    deps: [check]
    cmds:
      - docker-compose up -d

  db:down:
    desc: "Stop database services"
    aliases: [teardown]
    cmds:
      - docker-compose down

  db:restart:
    desc: "Restart database services"
    cmds:
      - docker-compose restart

  db:logs:
    desc: "Tail logs from all database containers"
    cmds:
      - docker-compose logs -f

  db:init:
    desc: "Initialize local data directories for databases"
    cmds:
      - echo "📁 Creating data directories..."
      - mkdir -p data/neo4j/{data,logs,plugins}
      - mkdir -p data/postgres
      - mkdir -p data/redis
      - mkdir -p backups
      - echo "✅ Data directories ready in ./data/"

  db:full-init:
    desc: "Full database setup: directories, containers, and schemas"
    cmds:
      - task: db:init
      - task: db:init:schemas

  db:init:schemas:
    desc: "Initialize database schemas (Neo4j, PostgreSQL, Redis)"
    deps: [db:up]
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - echo "🗄️ Initializing memory system schemas..."
      - echo "   (Waiting for databases to be ready...)"
      - sleep 25
      - uv run python api/manage.py init_memory_schema --verbose
      - echo ""
      - echo "✅ Schema initialization complete!"

  db:verify:schemas:
    desc: "Verify database schemas exist (no changes)"
    deps: [db:up]
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py init_memory_schema --verify

  db:migrate:
    desc: "Apply pending schema migrations (PostgreSQL + Neo4j)"
    deps: [db:up]
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py migrate_schema --verbose

  db:migrate:status:
    desc: "Show current schema versions and list pending migrations"
    deps: [db:up]
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py migrate_schema --status

  db:migrate:dry-run:
    desc: "Preview pending migrations without applying"
    deps: [db:up]
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py migrate_schema --dry-run

  memory:worker:
    desc: "Start background memory consolidation worker"
    deps: [db:up]
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python -m agentx_ai.kit.agent_memory.consolidation.worker

  db:status:
    desc: "Show status of database containers"
    cmds:
      - docker-compose ps

  db:clean:
    desc: "⚠️  Remove ALL database data (destructive!)"
    prompt: "This will DELETE all database data. Are you sure?"
    cmds:
      - rm -rf data/neo4j/data/*
      - rm -rf data/neo4j/logs/*
      - rm -rf data/neo4j/plugins/*
      - rm -rf data/postgres/*
      - rm -rf data/redis/*
      - echo "✅ Database data cleared"

  db:reset:
    desc: "⚠️  Wipe all database data and reinitialize schemas"
    prompt: "This will DELETE all database data and recreate schemas. Are you sure?"
    cmds:
      - task: db:down
      - task: db:clean
      - task: db:full-init
      - task: db:down

  db:shell:postgres:
    desc: "Open PostgreSQL shell (psql)"
    cmds:
      - docker exec -it agent-postgres psql -U agent -d agent_memory

  db:shell:redis:
    desc: "Open Redis CLI"
    cmds:
      - docker exec -it agent-redis redis-cli

  db:shell:neo4j:
    desc: "Open Neo4j Cypher shell"
    cmds:
      - docker exec -it agent-neo4j cypher-shell -u neo4j -p "${NEO4J_PASSWORD:-agent_memory}"

  db:backup:
    desc: "Backup PostgreSQL database"
    cmds:
      - echo "💾 Creating backup..."
      - mkdir -p backups
      - docker exec agent-postgres pg_dump -U agent agent_memory > "backups/postgres_$(date +%Y%m%d_%H%M%S).sql"
      - echo "✅ Backup saved to ./backups/"

  db:restore:
    desc: "Restore PostgreSQL from backup (BACKUP_FILE=path/to/file.sql)"
    requires:
      vars: [BACKUP_FILE]
    cmds:
      - echo "📥 Restoring from {{.BACKUP_FILE}}..."
      - docker exec -i agent-postgres psql -U agent -d agent_memory < "{{.BACKUP_FILE}}"
      - echo "✅ Restore complete!"

  db:migrate-volumes:
    desc: "Migrate data from Docker volumes to local ./data/"
    cmds:
      - task: db:migrate-volumes:neo4j
      - task: db:migrate-volumes:postgres
      - task: db:migrate-volumes:redis

  db:migrate-volumes:neo4j:
    desc: "Migrate Neo4j volumes to local"
    internal: true
    cmds:
      - mkdir -p data/neo4j/{data,logs,plugins}
      - docker run --rm -v agentx-source_neo4j_data:/from -v "{{.ROOT_DIR}}/data/neo4j/data:/to" alpine sh -c "cp -av /from/. /to/"
      - docker run --rm -v agentx-source_neo4j_logs:/from -v "{{.ROOT_DIR}}/data/neo4j/logs:/to" alpine sh -c "cp -av /from/. /to/"
      - docker run --rm -v agentx-source_neo4j_plugins:/from -v "{{.ROOT_DIR}}/data/neo4j/plugins:/to" alpine sh -c "cp -av /from/. /to/"
    status:
      - test -d data/neo4j/data/databases

  db:migrate-volumes:postgres:
    desc: "Migrate PostgreSQL volumes to local"
    internal: true
    cmds:
      - mkdir -p data/postgres
      - docker run --rm -v agentx-source_postgres_data:/from -v "{{.ROOT_DIR}}/data/postgres:/to" alpine sh -c "cp -av /from/. /to/"
    status:
      - test -f data/postgres/PG_VERSION

  db:migrate-volumes:redis:
    desc: "Migrate Redis volumes to local"
    internal: true
    cmds:
      - mkdir -p data/redis
      - docker run --rm -v agentx-source_redis_data:/from -v "{{.ROOT_DIR}}/data/redis:/to" alpine sh -c "cp -av /from/. /to/"
    status:
      - test -f data/redis/appendonlydir/appendonly.aof.1.base.rdb || test -f data/redis/appendonly.aof

# ============================================================================
# MCP TOOLS
# ============================================================================

  mcp:servers:
    desc: "List configured MCP servers"
    aliases: [mcp:list-servers]
    cmds:
      - curl -s http://127.0.0.1:12319/api/mcp/servers | python -m json.tool

  mcp:tools:
    desc: "List available MCP tools (requires API running)"
    aliases: [mcp:list-tools]
    cmds:
      - curl -s http://127.0.0.1:12319/api/mcp/tools | python -m json.tool

  mcp:resources:
    desc: "List available MCP resources (requires API running)"
    cmds:
      - curl -s http://127.0.0.1:12319/api/mcp/resources | python -m json.tool

  mcp:health:
    desc: "Check API health including memory systems"
    cmds:
      - curl -s "http://127.0.0.1:12319/api/health?include_memory=true" | python -m json.tool

# ============================================================================
# DOCUMENTATION
# ============================================================================

  docs:serve:
    desc: "Serve docs locally with live reload (port 8000)"
    cmds:
      - uv run mkdocs serve

  docs:build:
    desc: "Build static documentation site"
    cmds:
      - uv run mkdocs build

  docs:deploy:
    desc: "Deploy docs to GitHub Pages"
    cmds:
      - uv run mkdocs gh-deploy --force

# ============================================================================
# CLEANUP & RESET
# ============================================================================

  clean:
    desc: "Remove build artifacts and caches"
    cmds:
      - echo "🧹 Cleaning build artifacts..."
      - rm -rf site/
      - rm -rf client/dist/
      - rm -rf client/src-tauri/target/
      - rm -rf api/__pycache__/
      - rm -rf .pytest_cache/
      - find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - find . -type f -name "*.pyc" -delete 2>/dev/null || true
      - echo "✅ Clean complete!"

  clean:all:
    desc: "⚠️  Full reset: artifacts + node_modules + venv"
    prompt: "This removes node_modules and .venv. Continue?"
    cmds:
      - task: clean
      - rm -rf client/node_modules/
      - rm -rf .venv/
      - echo "✅ Full clean complete! Run 'task install' to reinstall."

  clean:appdata:
    desc: "⚠️  Remove AgentX user data (platform-specific)"
    prompt: "This removes your AgentX settings and data. Continue?"
    platforms: [linux, darwin]
    cmds:
      - |
        {{if eq .OS "linux"}}
        echo "🗑️  Removing Linux app data..."
        rm -rf ~/.local/share/agentx/
        rm -rf ~/.local/share/com.agentx.app/
        rm -rf ~/.config/agentx/
        rm -rf ~/.config/com.agentx.app/
        {{else if eq .OS "macos"}}
        echo "🗑️  Removing macOS app data..."
        rm -rf ~/Library/Application\ Support/agentx/
        rm -rf ~/Library/Application\ Support/com.agentx.app/
        rm -rf ~/Library/Preferences/com.agentx.app.plist
        rm -rf ~/Library/Caches/com.agentx.app/
        {{end}}
        echo "✅ App data removed!"

  clean:appdata:windows:
    desc: "⚠️  Remove AgentX user data (Windows)"
    platforms: [windows]
    cmds:
      - echo "🗑️  Removing Windows app data..."
      - cmd /c "rmdir /s /q %APPDATA%\\agentx 2>nul"
      - cmd /c "rmdir /s /q %APPDATA%\\com.agentx.app 2>nul"
      - cmd /c "rmdir /s /q %LOCALAPPDATA%\\agentx 2>nul"
      - cmd /c "rmdir /s /q %LOCALAPPDATA%\\com.agentx.app 2>nul"
      - echo "✅ App data removed!"

  clean:docker:
    desc: "⚠️  Remove Docker volumes (keeps local ./data/)"
    prompt: "Remove Docker volumes for this project?"
    cmds:
      - docker-compose down -v
      - echo "✅ Docker volumes removed!"
  
  remove:concurrently:
    prompt: "Remove globally installed 'concurrently' package?"
    desc: "Remove globally installed 'concurrently' package"
    cmds:
      - bun uninstall -g concurrently || echo "ℹ️  'concurrently' not found globally."

  reset:
    desc: "⚠️  Complete reset: stop services, clean everything"
    prompt: "This performs a FULL reset. All data will be lost. Continue?"
    cmds:
      - task: db:down
      - task: clean:all
      - task: db:clean
      - echo ""
      - echo "🔄 Reset complete! Run 'task setup' to start fresh."

# ============================================================================
# LINTING & FORMATTING
# ============================================================================

  lint:
    desc: "Run all linters"
    silent: true
    cmds:
      - task: lint:python
      - task: lint:client

  lint:python:
    desc: "Lint Python code with ruff"
    silent: true
    cmds:
      - uv run ruff check api/

  lint:python:fix:
    desc: "Auto-fix Python lint issues"
    cmds:
      - uv run ruff check --fix api/

  lint:client:
    desc: "Lint TypeScript/React code"
    dir: client
    silent: true
    cmds:
      - bun run lint 2>/dev/null || true

  format:
    desc: "Format all code"
    cmds:
      - task: format:python
      - task: format:client

  format:python:
    desc: "Format Python code with ruff"
    cmds:
      - uv run ruff format api/

  format:client:
    desc: "Format TypeScript/React code with prettier"
    dir: client
    cmds:
      - bunx prettier --write "src/**/*.{ts,tsx,css}" 2>/dev/null || echo "ℹ️  Prettier not configured"

# ============================================================================
# STATIC ANALYSIS & TYPE CHECKING
# ============================================================================

  check:types:
    desc: "Run all type checkers (Python + TypeScript)"
    cmds:
      - task: check:types:python
      - task: check:types:client

  check:types:python:
    desc: "Type check Python code with pyright"
    silent: true
    cmds:
      - uv run pyright api/agentx_ai/

  check:types:client:
    desc: "Type check TypeScript code"
    dir: client
    silent: true
    cmds:
      - bun run tsc --noEmit

  check:static:
    desc: "Run all static analysis (lint + types + build)"
    cmds:
      - |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📋 Static Analysis Suite"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        FAILED=""

        echo ""
        echo "1️⃣  Linting..."
        if task lint; then
          echo "  ✓ Linting passed"
        else
          FAILED="${FAILED}lint "
          echo "  ✗ Linting failed"
        fi

        echo ""
        echo "2️⃣  Type Checking..."
        if task check:types; then
          echo "  ✓ Type checking passed"
        else
          FAILED="${FAILED}types "
          echo "  ✗ Type checking failed"
        fi

        echo ""
        echo "3️⃣  Build Verification..."
        if task check:build; then
          echo "  ✓ Build verification passed"
        else
          FAILED="${FAILED}build "
          echo "  ✗ Build verification failed"
        fi

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if [ -n "$FAILED" ]; then
          echo "❌ Failed checks: $FAILED"
          exit 1
        else
          echo "✅ All static checks passed!"
        fi

  check:build:
    desc: "Verify both API and client build successfully"
    silent: true
    cmds:
      - task: check:build:api
      - task: check:build:client

  check:build:api:
    desc: "Verify Python imports and Django configuration"
    silent: true
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python -c "import sys; sys.path.insert(0, 'api'); import agentx_ai"
      - uv run python api/manage.py check --verbosity=0

  check:build:client:
    desc: "Build client web assets (TypeScript + Vite)"
    dir: client
    silent: true
    cmds:
      - bun run build >/dev/null 2>&1

# ============================================================================
# MODEL MANAGEMENT
# ============================================================================

  models:download:
    desc: "Pre-download AI models (translation, embeddings)"
    cmds:
      - echo "📥 Downloading translation models..."
      - uv run python -c "
        from transformers import AutoModelForSeq2SeqLM, AutoTokenizer, pipeline
        print('Downloading NLLB-200 translation model...')
        AutoModelForSeq2SeqLM.from_pretrained('facebook/nllb-200-distilled-600M')
        AutoTokenizer.from_pretrained('facebook/nllb-200-distilled-600M')
        print('Downloading language detection model...')
        pipeline('text-classification', model='eleldar/language-detection')
        print('✅ Models downloaded!')
        "

  models:cache:
    desc: "Show HuggingFace cache location and size"
    cmds:
      - |
        CACHE_DIR="${HF_HOME:-${XDG_CACHE_HOME:-$HOME/.cache}/huggingface}"
        echo "📁 HuggingFace cache: $CACHE_DIR"
        if [ -d "$CACHE_DIR" ]; then
          SIZE=$(du -sh "$CACHE_DIR" 2>/dev/null | cut -f1)
          echo "📊 Cache size: $SIZE"
          echo ""
          echo "Models cached:"
          ls -1 "$CACHE_DIR/hub" 2>/dev/null | grep "models--" | sed 's/models--/  - /' | sed 's/--/\//g' || echo "  (none)"
        else
          echo "  (cache directory not found)"
        fi

  models:clear:
    desc: "⚠️  Clear HuggingFace model cache"
    prompt: "This removes all cached models. They will re-download on next use. Continue?"
    cmds:
      - |
        CACHE_DIR="${HF_HOME:-${XDG_CACHE_HOME:-$HOME/.cache}/huggingface}"
        rm -rf "$CACHE_DIR/hub"
        echo "✅ Model cache cleared!"

  warmup:embeddings:
    desc: "Warm up embedding model (downloads if needed)"
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py warmup_embeddings --validate

# ============================================================================
# LOGS & DEBUGGING
# ============================================================================

  logs:
    desc: "Tail all logs (Docker + API)"
    cmds:
      - bunx concurrently -n "DOCKER,API" -c "gray,cyan" 
          "docker-compose logs -f --tail=50" 
          "tail -f api/*.log 2>/dev/null || echo 'No API logs found'"

  logs:docker:
    desc: "Tail Docker container logs"
    cmds:
      - docker-compose logs -f --tail=100

  logs:api:
    desc: "Tail Django API logs"
    cmds:
      - tail -f api/*.log 2>/dev/null || echo "No log files. Logs go to stdout in dev mode."

  debug:env:
    desc: "Show environment configuration"
    cmds:
      - echo "🔧 Environment Configuration"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - 'echo "Platform: {{.OS}}"'
      - 'echo "Python:   $(python --version 2>&1)"'
      - 'echo "Node:     $(node --version 2>&1)"'
      - 'echo "Bun:      $(bun --version 2>&1)"'
      - 'echo "Docker:   $(docker --version 2>&1)"'
      - 'echo "Task:     $(task --version 2>&1)"'
      - echo ""
      - 'echo "📁 Key Paths:"'
      - 'echo "  Project root: $(pwd)"'
      - 'echo "  Python venv:  $(which python)"'
      - 'echo "  uv cache:     ${UV_CACHE_DIR:-~/.cache/uv}"'
      - 'echo "  HF cache:     ${HF_HOME:-~/.cache/huggingface}"'
      - echo ""
      - 'echo "🔑 API Keys Configured:"'
      - |
        [ -n "$OPENAI_API_KEY" ] && echo "  ✓ OPENAI_API_KEY" || echo "  ✗ OPENAI_API_KEY"
        [ -n "$ANTHROPIC_API_KEY" ] && echo "  ✓ ANTHROPIC_API_KEY" || echo "  ✗ ANTHROPIC_API_KEY"
        [ -n "$GITHUB_TOKEN" ] && echo "  ✓ GITHUB_TOKEN" || echo "  ✗ GITHUB_TOKEN"

  debug:ports:
    desc: "Check if required ports are available"
    cmds:
      - echo "🔌 Port Status"
      - echo "━━━━━━━━━━━━━━"
      - |
        check_port() {
          if lsof -i ":$1" >/dev/null 2>&1; then
            PROC=$(lsof -i ":$1" -t 2>/dev/null | head -1)
            NAME=$(ps -p "$PROC" -o comm= 2>/dev/null)
            echo "  $1: IN USE by $NAME (PID $PROC)"
          else
            echo "  $1: available ✓"
          fi
        }
        echo "API & Client:"
        check_port 12319
        check_port 1420
        check_port 1421
        echo ""
        echo "Databases:"
        check_port 7687
        check_port 7474
        check_port 5432
        check_port 6379

  debug:api:
    desc: "Test API endpoints"
    cmds:
      - echo "🧪 Testing API Endpoints"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - echo "GET /api/index"
      - curl -s http://127.0.0.1:12319/api/index | python -m json.tool 2>/dev/null || echo "  ❌ Failed (is API running?)"
      - echo ""
      - echo "GET /api/health"
      - curl -s http://127.0.0.1:12319/api/health | python -m json.tool 2>/dev/null || echo "  ❌ Failed"
      - echo ""
      - echo "GET /api/providers"
      - curl -s http://127.0.0.1:12319/api/providers | python -m json.tool 2>/dev/null || echo "  ❌ Failed"

# ============================================================================
# RELEASE & BUILD
# ============================================================================

  versions:sync:
    desc: "Sync version from versions.yaml to all manifests (package.json, Cargo.toml, tauri.conf.json, pyproject.toml)"
    silent: true
    platforms: [linux]
    cmds:
      - |
        API_VERSION=$(python3 -c "import yaml; d=yaml.safe_load(open('versions.yaml')); print(d['api']['version'])")
        CLIENT_VERSION=$(python3 -c "import yaml; d=yaml.safe_load(open('versions.yaml')); print(d['client']['version'])")
        echo "Syncing versions — api: $API_VERSION  client: $CLIENT_VERSION"

        # pyproject.toml
        sed -i "s/^version = \".*\"/version = \"$API_VERSION\"/" pyproject.toml
        echo "  ✓ pyproject.toml"

        # client/package.json
        sed -i "s/\"version\": \".*\"/\"version\": \"$CLIENT_VERSION\"/" client/package.json
        echo "  ✓ client/package.json"

        # client/src-tauri/Cargo.toml  (first occurrence = package version)
        sed -i "0,/^version = \".*\"/s/^version = \".*\"/version = \"$CLIENT_VERSION\"/" client/src-tauri/Cargo.toml
        echo "  ✓ client/src-tauri/Cargo.toml"

        # client/src-tauri/tauri.conf.json
        sed -i "s/\"version\": \".*\"/\"version\": \"$CLIENT_VERSION\"/" client/src-tauri/tauri.conf.json
        echo "  ✓ client/src-tauri/tauri.conf.json"

        echo "Done."

  release:build:
    desc: "Build release binaries for current platform"
    cmds:
      - echo "🔨 Building release..."
      - task: client:build
      - echo ""
      - echo "✅ Build complete! Binaries in client/src-tauri/target/release/"
      - ls -lh client/src-tauri/target/release/bundle/*/* 2>/dev/null || echo "(check target/release for output)"

  release:build:debug:
    desc: "Build debug binary (faster, larger)"
    dir: client
    cmds:
      - bun run tauri build --debug

  release:check:
    desc: "Verify release readiness"
    cmds:
      - echo "🔍 Release Checklist"
      - echo "━━━━━━━━━━━━━━━━━━━━"
      - |
        ISSUES=""
        
        # Check for uncommitted changes
        if [ -n "$(git status --porcelain)" ]; then
          ISSUES="${ISSUES}\n  ⚠️  Uncommitted changes detected"
        else
          echo "  ✓ Git working tree clean"
        fi
        
        # Check tests pass
        echo "  ⏳ Running tests..."
        if uv run python api/manage.py test agentx_ai.tests --verbosity=0 2>/dev/null; then
          echo "  ✓ Tests passing"
        else
          ISSUES="${ISSUES}\n  ❌ Tests failing"
        fi
        
        # Check TypeScript compiles
        echo "  ⏳ Checking TypeScript..."
        if (cd client && bun run build 2>/dev/null); then
          echo "  ✓ TypeScript compiles"
        else
          ISSUES="${ISSUES}\n  ❌ TypeScript errors"
        fi
        
        if [ -n "$ISSUES" ]; then
          echo ""
          echo "Issues found:"
          echo -e "$ISSUES"
          exit 1
        else
          echo ""
          echo "✅ Ready for release!"
        fi

# ============================================================================
# QUICK SHORTCUTS
# ============================================================================

  s:
    desc: "Shortcut: task setup"
    cmds:
      - task: setup

  d:
    desc: "Shortcut: task dev"
    cmds:
      - task: dev

  t:
    desc: "Shortcut: task test"
    cmds:
      - task: test

  b:
    desc: "Shortcut: task release:build"
    cmds:
      - task: release:build

  c:
    desc: "Shortcut: task check"
    cmds:
      - task: check

# ============================================================================
# AUTHENTICATION (Phase 17)
# ============================================================================

  auth:setup:
    desc: "Set up root user password (interactive)"
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py setup_auth

  auth:setup:force:
    desc: "Reset root user password (requires confirmation)"
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py setup_auth --force

  auth:check:
    desc: "Check if authentication setup is required"
    env:
      DJANGO_SETTINGS_MODULE: agentx_api.settings
    cmds:
      - uv run python api/manage.py setup_auth --check

# ============================================================================
# PRODUCTION DEPLOYMENT (Phase 17)
# ============================================================================

  prod:build:
    desc: "Build production Docker image"
    cmds:
      - echo "🔨 Building production Docker image..."
      - docker compose --profile production build
      - echo "✅ Build complete!"

  prod:up:
    desc: "Start full production stack (API + databases)"
    cmds:
      - echo "🚀 Starting production stack..."
      - docker compose --profile production up -d
      - echo "\n"
      - echo "✅ Production stack is running!"
      - 'echo "API: http://localhost:12319"'
      - echo "\n"
      - 'echo "📋 Next steps:"'
      - 'echo "   1. Set root password: task prod:auth:setup"'
      - 'echo "   2. Configure Cloudflare Tunnel"'
      - 'echo "   3. Add tunnel domain to CORS/CSRF settings"'

  prod:down:
    desc: "Stop production stack"
    cmds:
      - docker compose --profile production down

  prod:restart:
    desc: "Restart production API"
    cmds:
      - docker compose --profile production restart api

  prod:logs:
    desc: "Tail production logs"
    cmds:
      - docker compose --profile production logs -f api

  prod:status:
    desc: "Show production stack status"
    cmds:
      - docker compose --profile production ps

  prod:auth:setup:
    desc: "Set up root password in production container"
    cmds:
      - docker compose --profile production exec api uv run python api/manage.py setup_auth

  prod:warmup:
    desc: "Warm up embedding model in production container"
    cmds:
      - docker compose --profile production exec api uv run python api/manage.py warmup_embeddings --validate

  prod:shell:
    desc: "Open shell in production API container"
    cmds:
      - docker compose --profile production exec api /bin/bash

# ============================================================================
# MOBILE / ANDROID
# ============================================================================
# Tauri v2 mobile builds. Requires Android Studio + SDK + NDK + JDK 17 with
# ANDROID_HOME, NDK_HOME, JAVA_HOME exported. First run needs:
#   cd client && bunx tauri android init

  client:android:init:
    desc: "Bootstrap Tauri Android project (first-time only)"
    dir: client
    cmds:
      - bunx tauri android init

  client:dev:android:
    desc: "Run Tauri Android app in dev mode (hot-reload onto connected device)"
    dir: client
    cmds:
      - bunx tauri android dev

  client:build:android:
    desc: "Build debug-signed Android APK"
    dir: client
    cmds:
      # The APK ships with no baked-in server URL or gateway token — users
      # add servers (and their tokens) through the in-app login screen.
      - bunx tauri android build --apk true --debug
      - echo ""
      - 'echo "📦 APK: client/src-tauri/gen/android/app/build/outputs/apk/universal/debug/"'
      - 'echo "Install with: adb install <path-to-apk>"'

# ============================================================================
# CLUSTER DEPLOYMENT
# ============================================================================
# Clusters are the production deployment unit. Each lives in clusters/<name>/
# with its own .env and data/. Public-facing clusters opt in to the Nginx +
# Cloudflare Tunnel gateway by additionally having nginx.conf and a populated
# cloudflared/ directory; cluster:up auto-detects the overlay by file
# presence.
#
# Usage: task cluster:<command> CLUSTER=<name>
#        task cluster:new CLUSTER=<name> [GATEWAY=1]

  cluster:new:
    desc: "Create a new cluster (CLUSTER=name [GATEWAY=1])"
    vars:
      CLUSTER: '{{.CLUSTER}}'
      GATEWAY: '{{.GATEWAY}}'
    cmds:
      - |
        if [ -z "{{.CLUSTER}}" ]; then
          echo "Usage: task cluster:new CLUSTER=<name> [GATEWAY=1]"
          echo ""
          echo "Creates clusters/<name>/ from clusters/template/:"
          echo "  - .env       (copy of clusters/template/.env.example)"
          echo "  - config/    (seeded from api/defaults/)"
          echo "  - db/        (empty neo4j/postgres/redis subdirs)"
          echo "  - With GATEWAY=1: nginx.conf + cloudflared/config.yml"
          exit 1
        fi
        if [ -e "clusters/{{.CLUSTER}}" ]; then
          echo "Cluster already exists: clusters/{{.CLUSTER}}/"
          exit 1
        fi
        mkdir -p "clusters/{{.CLUSTER}}/db"/{neo4j/{data,logs,plugins},postgres,redis}
        mkdir -p "clusters/{{.CLUSTER}}/config"
        cp api/defaults/*.yaml api/defaults/*.json "clusters/{{.CLUSTER}}/config/"
        cp clusters/template/.env.example "clusters/{{.CLUSTER}}/.env"
        sed -i "s|^AGENTX_CLUSTER_NAME=$|AGENTX_CLUSTER_NAME={{.CLUSTER}}|" "clusters/{{.CLUSTER}}/.env"
        sed -i "s|^AGENTX_CONFIG_DIR=.*|AGENTX_CONFIG_DIR=./clusters/{{.CLUSTER}}/config|" "clusters/{{.CLUSTER}}/.env"
        sed -i "s|^AGENTX_DB_DIR=.*|AGENTX_DB_DIR=./clusters/{{.CLUSTER}}/db|" "clusters/{{.CLUSTER}}/.env"
        HOST_IP=$(hostname -I | awk '{print $1}')
        if [ -n "$HOST_IP" ]; then
          sed -i "s|^DJANGO_ALLOWED_HOSTS=$|DJANGO_ALLOWED_HOSTS=${HOST_IP}|" "clusters/{{.CLUSTER}}/.env"
        fi
        echo "Cluster created: clusters/{{.CLUSTER}}/"
        echo "  ✓ config/ seeded from api/defaults/"
        if [ "{{.GATEWAY}}" = "1" ]; then
          mkdir -p "clusters/{{.CLUSTER}}/cloudflared"
          cp clusters/template/nginx.conf.example "clusters/{{.CLUSTER}}/nginx.conf"
          cp clusters/template/cloudflared/config.yml.example "clusters/{{.CLUSTER}}/cloudflared/config.yml"
          echo "  ✓ Gateway scaffolded: nginx.conf + cloudflared/config.yml"
        fi
        echo ""
        echo "Next steps:"
        echo "  1. Edit clusters/{{.CLUSTER}}/.env"
        echo "     - Set unique ports if running alongside other clusters"
        echo "     - Generate DJANGO_SECRET_KEY"
        echo "     - Set database passwords + provider API keys"
        if [ "{{.GATEWAY}}" = "1" ]; then
          echo "     - Set AGENTX_PUBLIC_HOST and AGENTX_GATEWAY_TOKEN"
          echo "  2. Edit clusters/{{.CLUSTER}}/cloudflared/config.yml — paste tunnel id + hostname"
          echo "  3. Drop credentials.json into clusters/{{.CLUSTER}}/cloudflared/"
          echo "  4. Start: task cluster:up CLUSTER={{.CLUSTER}}"
        else
          echo "  2. Start: task cluster:up CLUSTER={{.CLUSTER}}"
        fi

  cluster:seed:
    desc: "Seed a cluster's config/ from api/defaults/ (CLUSTER=name [FORCE=1])"
    vars:
      CLUSTER: '{{.CLUSTER}}'
      FORCE: '{{.FORCE}}'
    cmds:
      - |
        if [ -z "{{.CLUSTER}}" ] || [ ! -d "clusters/{{.CLUSTER}}" ]; then
          echo "Usage: task cluster:seed CLUSTER=<name> [FORCE=1]"
          echo "  Cluster must already exist."
          exit 1
        fi
        shopt -s nullglob
        # Legacy layout migration: clusters/<name>/data/{neo4j,postgres,redis}
        # → clusters/<name>/db/{neo4j,postgres,redis}.
        if [ -d "clusters/{{.CLUSTER}}/data" ] && [ ! -d "clusters/{{.CLUSTER}}/db" ]; then
          echo "Migrating legacy data/ → db/ + config/ layout..."
          if ! mv "clusters/{{.CLUSTER}}/data" "clusters/{{.CLUSTER}}/db"; then
            echo "  ✗ Failed to move data/ → db/. Is the cluster running? Try:"
            echo "      task cluster:down CLUSTER={{.CLUSTER}}"
            exit 1
          fi
          # If the legacy data/ also contained app config (yaml/json next to
          # the db subdirs), pull it out into config/.
          mkdir -p "clusters/{{.CLUSTER}}/config"
          for f in "clusters/{{.CLUSTER}}/db"/*.yaml "clusters/{{.CLUSTER}}/db"/*.json; do
            mv "$f" "clusters/{{.CLUSTER}}/config/"
          done
          echo "  ✓ Moved db storage to clusters/{{.CLUSTER}}/db/"
          # Update .env: drop AGENTX_DATA_DIR, add AGENTX_CONFIG_DIR + AGENTX_DB_DIR.
          ENV="clusters/{{.CLUSTER}}/.env"
          if [ -f "$ENV" ]; then
            sed -i '/^AGENTX_DATA_DIR=/d' "$ENV"
            grep -q '^AGENTX_CONFIG_DIR=' "$ENV" || \
              echo "AGENTX_CONFIG_DIR=./clusters/{{.CLUSTER}}/config" >> "$ENV"
            grep -q '^AGENTX_DB_DIR=' "$ENV" || \
              echo "AGENTX_DB_DIR=./clusters/{{.CLUSTER}}/db" >> "$ENV"
            echo "  ✓ Updated $ENV (AGENTX_CONFIG_DIR + AGENTX_DB_DIR)"
          fi
        fi
        mkdir -p "clusters/{{.CLUSTER}}/config"
        seed_files=(api/defaults/*.yaml api/defaults/*.json)
        if [ ${#seed_files[@]} -eq 0 ]; then
          echo "  ✗ No seed files found under api/defaults/"
          exit 1
        fi
        for src in "${seed_files[@]}"; do
          name=$(basename "$src")
          dest="clusters/{{.CLUSTER}}/config/$name"
          if [ -f "$dest" ] && [ "{{.FORCE}}" != "1" ]; then
            echo "  skip $name (exists; pass FORCE=1 to overwrite)"
          else
            cp "$src" "$dest"
            echo "  seed $name"
          fi
        done
        echo "Seeded clusters/{{.CLUSTER}}/config/"

  cluster:gateway:enable:
    desc: "Add the Nginx + Cloudflare gateway to an existing cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        if [ -z "{{.CLUSTER}}" ] || [ ! -d "clusters/{{.CLUSTER}}" ]; then
          echo "Usage: task cluster:gateway:enable CLUSTER=<name> (must already exist)"
          exit 1
        fi
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          echo "Gateway already enabled for clusters/{{.CLUSTER}}/"
          exit 0
        fi
        mkdir -p "clusters/{{.CLUSTER}}/cloudflared"
        cp clusters/template/nginx.conf.example "clusters/{{.CLUSTER}}/nginx.conf"
        cp clusters/template/cloudflared/config.yml.example "clusters/{{.CLUSTER}}/cloudflared/config.yml"
        echo "Gateway scaffolded for clusters/{{.CLUSTER}}/."
        echo "Edit clusters/{{.CLUSTER}}/.env (AGENTX_PUBLIC_HOST, AGENTX_GATEWAY_TOKEN)"
        echo "and clusters/{{.CLUSTER}}/cloudflared/config.yml, then drop credentials.json."

  cluster:up:
    desc: "Start a cluster (CLUSTER=name [REBUILD=1]); auto-includes gateway overlay if nginx.conf present"
    vars:
      CLUSTER: '{{.CLUSTER}}'
      REBUILD: '{{.REBUILD}}'
    cmds:
      - |
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          OVERLAY="-f docker-compose.yml -f docker-compose.cluster.yml"
          echo "🚀 Starting cluster {{.CLUSTER}} with gateway (Nginx + Cloudflared)..."
        else
          OVERLAY=""
          echo "🚀 Starting cluster {{.CLUSTER}} (no public gateway)..."
        fi
        BUILD_FLAG=""
        if [ "{{.REBUILD}}" = "1" ]; then
          echo "🔨 Rebuilding images..."
          BUILD_FLAG="--build"
        fi
        docker compose --env-file clusters/{{.CLUSTER}}/.env $OVERLAY --profile production up -d $BUILD_FLAG
        echo ""
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          echo "Smoke test:"
          echo "  curl -I https://\$AGENTX_PUBLIC_HOST/api/health  → expect 401"
          echo "  curl -I -H 'AgentX-Gateway-Token: \$AGENTX_GATEWAY_TOKEN' https://\$AGENTX_PUBLIC_HOST/api/health  → expect 200"
        else
          echo "API: http://localhost:\$API_PORT/api/health"
        fi

  cluster:down:
    desc: "Stop a cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          OVERLAY="-f docker-compose.yml -f docker-compose.cluster.yml"
        else
          OVERLAY=""
        fi
        docker compose --env-file clusters/{{.CLUSTER}}/.env $OVERLAY --profile production down

  cluster:rebuild:
    desc: "Rebuild images and restart a cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          OVERLAY="-f docker-compose.yml -f docker-compose.cluster.yml"
        else
          OVERLAY=""
        fi
        echo "🔨 Rebuilding images for cluster {{.CLUSTER}}..."
        docker compose --env-file clusters/{{.CLUSTER}}/.env $OVERLAY --profile production build
        docker compose --env-file clusters/{{.CLUSTER}}/.env $OVERLAY --profile production up -d

  cluster:restart:
    desc: "Restart a cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          OVERLAY="-f docker-compose.yml -f docker-compose.cluster.yml"
        else
          OVERLAY=""
        fi
        docker compose --env-file clusters/{{.CLUSTER}}/.env $OVERLAY --profile production restart

  cluster:logs:
    desc: "View cluster logs (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          OVERLAY="-f docker-compose.yml -f docker-compose.cluster.yml"
        else
          OVERLAY=""
        fi
        docker compose --env-file clusters/{{.CLUSTER}}/.env $OVERLAY --profile production logs -f

  cluster:logs:gateway:
    desc: "Tail nginx gateway logs (CLUSTER=name; token rejections appear as 401)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - docker compose --env-file clusters/{{.CLUSTER}}/.env -f docker-compose.yml -f docker-compose.cluster.yml --profile production logs -f nginx

  cluster:logs:tunnel:
    desc: "Tail cloudflared tunnel logs (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - docker compose --env-file clusters/{{.CLUSTER}}/.env -f docker-compose.yml -f docker-compose.cluster.yml --profile production logs -f cloudflared

  cluster:status:
    desc: "Show cluster status (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - |
        if [ -f "clusters/{{.CLUSTER}}/nginx.conf" ]; then
          OVERLAY="-f docker-compose.yml -f docker-compose.cluster.yml"
        else
          OVERLAY=""
        fi
        docker compose --env-file clusters/{{.CLUSTER}}/.env $OVERLAY --profile production ps

  cluster:migrate:
    desc: "Apply Django migrations in a cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - docker compose --env-file clusters/{{.CLUSTER}}/.env --profile production exec api uv run python api/manage.py migrate

  cluster:makemigrations:
    desc: "Generate new Django migrations in a cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - docker compose --env-file clusters/{{.CLUSTER}}/.env --profile production exec api uv run python api/manage.py makemigrations

  cluster:auth:setup:
    desc: "Set up root password for cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - docker compose --env-file clusters/{{.CLUSTER}}/.env --profile production exec api uv run python api/manage.py setup_auth

  cluster:warmup:
    desc: "Warm up embedding model for cluster (CLUSTER=name)"
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmds:
      - docker compose --env-file clusters/{{.CLUSTER}}/.env --profile production exec api uv run python api/manage.py warmup_embeddings --validate

  cluster:list:
    desc: "List all clusters"
    cmds:
      - |
        echo "Clusters:"
        for dir in clusters/*/; do
          name=$(basename "$dir")
          [ "$name" = "template" ] && continue
          if [ -d "$dir" ]; then
            tags=""
            [ -f "$dir/.env" ] || tags="$tags missing-env"
            [ -f "$dir/nginx.conf" ] && tags="$tags gateway"
            echo "  $name${tags:+ —$tags}"
          fi
        done 2>/dev/null || echo "  (none)"
