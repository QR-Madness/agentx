<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AgentX - AI Toolbox</title>
    <style>
      /* Boot splash — painted instantly, before the JS bundle parses, so the
         frameless window never opens to a blank/white flash. Removed by
         src/main.tsx once React has committed its first frame. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #05070f;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }
      #splash.splash-hide { opacity: 0; pointer-events: none; }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .splash-logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        box-shadow: 0 0 44px rgba(139, 92, 246, 0.45);
      }
      .splash-name {
        color: #e2e8f0;
        font: 600 20px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        letter-spacing: 0.05em;
      }
      .splash-spinner {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2.5px solid rgba(255, 255, 255, 0.12);
        border-top-color: #06b6d4;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .splash-spinner { animation: none; } }
    </style>
  </head>

  <body>
    <div id="splash">
      <div class="splash-inner">
        <img src="/favicon.png" alt="" class="splash-logo" />
        <div class="splash-name">AgentX</div>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <div id="root"></div>
    <div id="modal-root"></div>
    <div id="toast-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
