name: CI

# Runs the same gates as the local dev loop (Taskfile), so "laptop discipline"
# becomes a guarantee. Fast: no build matrix, no model downloads.

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: lint · types · docs-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (+ dependency cache, Python 3.14 to match the pyright baseline)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install API deps (also asserts uv.lock is current)
        run: uv sync --frozen

      - name: Install client deps (also asserts bun.lock is current)
        working-directory: client
        run: bun install --frozen-lockfile

      - name: Lint — ruff
        run: task lint:python

      - name: Types — Python (pyright baseline ratchet)
        run: task check:types:python:baseline

      - name: Types — client (tsc)
        run: task check:types:client

      - name: Doc + API-spec + schema (Alembic) drift gate
        run: task docs:check

      - name: Backend tests (quick — no models, no Docker)
        run: task test:quick

  manager:
    name: deployment manager · tests + types
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install manager deps (asserts manager/uv.lock is current)
        working-directory: manager
        run: uv sync --frozen

      - name: Types — pyright (manager venv)
        working-directory: manager
        run: uv run --with pyright pyright agentx_manager tests

      - name: Unit tests (fake compose runner — no docker)
        working-directory: manager
        run: uv run pytest tests/unit -q

      - name: Integration tests (real nginx gateway, fake API upstream)
        working-directory: manager
        run: uv run pytest tests/integration -m docker -q
