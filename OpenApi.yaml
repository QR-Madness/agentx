  /conversations/{conversation_id}/state:
    get:
      tags: [Conversations]
      operationId: conversationStateGet
      summary: Get the structured conversation-state object
      description: >
        The agent's structured working memory for the conversation
        (goals/decisions/open_threads/artifacts/narrative), each entry
        provenance-stamped. Empty slots for a conversation with no state yet.
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationStateResponse'
    patch:
      tags: [Conversations]
      operationId: conversationStatePatch
      summary: Replace one conversation-state slot (user edit)
      description: >
        Replaces the whole slot with the given entries (add/edit/remove in one
        call). A user edit is authoritative; entries may round-trip existing
        provenance, and new entries default to author=user.
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slot, entries]
              properties:
                slot:
                  type: string
                  enum: [goals, decisions, open_threads, artifacts, narrative]
                entries:
                  type: array
                  items:
                    type: object
                    required: [text]
                    properties:
                      text: { type: string }
                      author: { type: string, enum: [user, agent] }
                      source_turn: { type: integer, nullable: true }
      responses:
        '200':
          description: Updated conversation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationStateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /memory/channels:
    get:
      tags: [Memory]
      operationId: memoryChannels
      summary: List memory channels
      responses:
        '200':
          description: Channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      $ref: '#/components/schemas/MemoryChannel'
    post:
      tags: [Memory]
      operationId: memoryChannelCreate
      summary: Create a channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'

  /memory/channels/{name}:
    delete:
      tags: [Memory]
      operationId: memoryChannelDelete
      summary: Delete a channel and its data
      parameters:
        - $ref: '#/components/parameters/ChannelName'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/conversations/{conversation_id}:
    delete:
      tags: [Memory]
      operationId: memoryConversationDelete
      summary: Delete a conversation and its turns
      description: >-
        Removes the conversation across Neo4j (turns), PostgreSQL
        (`conversation_logs`), Redis working memory, project membership, its
        `conversation_meta` row (custom title / archived flag), and its sidecar
        families — structured state, rolling summary, and the ambassador's Inquiry
        thread (each best-effort; the response's `deleted.sidecars` lists what
        cleared).
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/conversations/{conversation_id}/meta:
    patch:
      tags: [Memory]
      operationId: memoryConversationMeta
      summary: Set user-set conversation metadata (title / archived)
      description: >-
        Durable conversation-meta overlay (`conversation_meta`, Postgres): a custom
        `title` that overrides the derived first-user-message title in listings, and
        an `archived` flag that excludes the conversation from listings and the
        Ambassador's survey/search by default (`include_archived` opts back in).
        This is the **execution half of the Ambassador's confirmed-write
        proposals** (rename/archive) and the client's manual rename/restore —
        the tool belt itself never writes. Meta-only: transcript turns are never
        touched.
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one of `title` / `archived` is required.
              properties:
                title:
                  type: string
                  maxLength: 200
                  description: Non-empty custom title
                archived:
                  type: boolean
      responses:
        '200':
          description: Applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation_id:
                    type: string
                  title:
                    type: string
                  archived:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          description: The write could not be persisted (database unavailable)

  /memory/entities:
    get:
      tags: [Memory]
      operationId: memoryEntities
      summary: List entities
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Entities (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      $ref: '#/components/schemas/MemoryEntity'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  has_next:
                    type: boolean

  /memory/entities/{entity_id}:
    get:
      tags: [Memory]
      operationId: memoryEntityDetail
      summary: Get one entity
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryEntity'
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/entities/{entity_id}/graph:
    get:
      tags: [Memory]
      operationId: memoryEntityGraph
      summary: Entity relationship graph
      parameters:
        - $ref: '#/components/parameters/EntityId'
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            default: 2
            maximum: 3
      responses:
        '200':
          description: Graph
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts:
    get:
      tags: [Memory]
      operationId: memoryFacts
      summary: List facts
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - name: min_confidence
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Facts (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  facts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Fact'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  has_next:
                    type: boolean

  /memory/facts/{fact_id}:
    get:
      tags: [Memory]
      operationId: memoryFactDetail
      summary: Get one fact
      parameters:
        - $ref: '#/components/parameters/FactId'
      responses:
        '200':
          description: Fact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fact'
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/remember:
    post:
      tags: [Memory]
      operationId: memoryFactRemember
      summary: Boost a fact's salience ("remember this")
      description: >-
        Raises the fact's salience so it survives memory decay and ranks higher
        in recall.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: number
                  description: Target salience, clamped to [0, 1] (default 0.9).
                  default: 0.9
      responses:
        '200':
          description: Updated fact
          content:
            application/json:
              schema:
                type: object
                properties:
                  fact:
                    $ref: '#/components/schemas/Fact'
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/forget:
    post:
      tags: [Memory]
      operationId: memoryFactForget
      summary: Forget a fact (soft-retire by default)
      description: >-
        Soft mode (default) marks the fact `temporal_context: past` and lowers
        its confidence + salience so recall de-prioritizes it, while preserving
        provenance. `hard: true` deletes the node permanently.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                hard:
                  type: boolean
                  description: Permanently delete instead of soft-retiring.
                  default: false
      responses:
        '200':
          description: Forget result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  mode:
                    type: string
                    enum: [soft, hard]
                  fact_id: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/entities:
    post:
      tags: [Memory]
      operationId: memoryFactLinkEntity
      summary: Link an entity to a fact (ABOUT edge)
      description: >-
        Creates a manual `(:Fact)-[:ABOUT {method:'manual'}]->(:Entity)` link.
        User-scoped on both nodes. Returns the fact's updated `{id,name,type}`
        entity list.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_id]
              properties:
                entity_id:
                  type: string
                  description: The entity to link this fact to.
      responses:
        '200':
          description: Updated entity list for the fact
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        type: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Memory]
      operationId: memoryFactUnlinkEntity
      summary: Unlink an entity from a fact
      description: >-
        Removes the `(:Fact)-[:ABOUT]->(:Entity)` link. User-scoped. Returns the
        fact's remaining `{id,name,type}` entity list.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_id]
              properties:
                entity_id:
                  type: string
                  description: The entity to unlink from this fact.
      responses:
        '200':
          description: Remaining entity list for the fact
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        type: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/provenance:
    get:
      tags: [Memory]
      operationId: memoryFactProvenance
      summary: Where was this fact learned?
      description: >-
        Resolves the fact's `source_turn_id` to its originating conversation and
        turn snippet, when still on record.
      parameters:
        - $ref: '#/components/parameters/FactId'
      responses:
        '200':
          description: Provenance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  fact_id: { type: string }
                  claim: { type: string }
                  source: { type: string, nullable: true }
                  source_turn_id: { type: string, nullable: true }
                  origin:
                    type: object
                    nullable: true
                    properties:
                      conversation_id: { type: string }
                      role: { type: string }
                      timestamp: { type: string }
                      snippet: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/strategies:
    get:
      tags: [Memory]
      operationId: memoryStrategies
      summary: List procedural strategies
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Strategies (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategies:
                    type: array
                    items:
                      $ref: '#/components/schemas/Strategy'
                  total:
                    type: integer

  /memory/procedures:
    get:
      tags: [Memory]
      operationId: memoryProcedures
      summary: List distilled procedures
      description: >
        Distilled procedural memory (Slice 1): the "how we work here" deltas the
        `distill_procedures` consolidation job mints from corrections/steers and
        explicit user rules. Each carries a natural-language trigger + replayable body.
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Procedures (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  procedures:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        trigger: { type: string }
                        body: { type: string }
                        rationale: { type: string }
                        scope: { type: string }
                        agent_id: { type: string, nullable: true }
                        strength: { type: integer }
                        signal_kinds:
                          type: array
                          items: { type: string }
                        evidence_refs:
                          type: array
                          items: { type: string }
                          description: "`cand:<id>` and `conv:<conversation_id>` provenance refs"
                        channel: { type: string }
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  has_next:
                    type: boolean

  /memory/stats:
    get:
      tags: [Memory]
      operationId: memoryStats
      summary: Memory statistics
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryStats'

  /metrics/usage:
    get:
      tags: [Memory]
      operationId: usageMetrics
      summary: Aggregated token/cost/latency usage
      description: >-
        Aggregates the unified `usage_events` spend ledger (chat, multi-agent,
        ambassador, and voice TTS/STT) into overall totals plus per-model,
        per-agent, per-source breakdowns and a daily time series for the last
        `days` days. `avg_latency_ms` is read from `conversation_logs`. Degrades
        gracefully (zeros + `unavailable: true`, HTTP 200) when the database is
        offline.
      parameters:
        - name: days
          in: query
          required: false
          description: Window size in days (clamped 1–90).
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 90
      responses:
        '200':
          description: Usage metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: object
                    properties:
                      turns: { type: integer }
                      tokens_input: { type: integer }
                      tokens_output: { type: integer }
                      tokens_total: { type: integer }
                      cost_total: { type: number }
                      cost_currency: { type: string }
                      avg_latency_ms: { type: number }
                  by_model:
                    type: array
                    items:
                      type: object
                      properties:
                        model: { type: string }
                        turns: { type: integer }
                        tokens_input: { type: integer }
                        tokens_output: { type: integer }
                        tokens_total: { type: integer }
                        cost_total: { type: number }
                  by_agent:
                    type: array
                    description: Per-agent breakdown grouped by `usage_events.agent_id`. NULL rows fall under the literal `_default`.
                    items:
                      type: object
                      properties:
                        agent_id: { type: string }
                        turns: { type: integer }
                        tokens_input: { type: integer }
                        tokens_output: { type: integer }
                        tokens_total: { type: integer }
                        cost_total: { type: number }
                  by_source:
                    type: array
                    description: >-
                      Per-source breakdown — `chat`, `alloy`, `ambassador_llm`,
                      `ambassador_tts`, `ambassador_stt`. Audio sources contribute
                      cost but zero tokens.
                    items:
                      type: object
                      properties:
                        source: { type: string }
                        turns: { type: integer }
                        tokens_input: { type: integer }
                        tokens_output: { type: integer }
                        tokens_total: { type: integer }
                        cost_total: { type: number }
                  daily:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string }
                        turns: { type: integer }
                        tokens_total: { type: integer }
                        cost_total: { type: number }
                  days: { type: integer }
                  unavailable:
                    type: boolean
                    description: Present and true when databases are offline.

  /memory/checkpoints:
    get:
      tags: [Memory]
      operationId: memoryCheckpointsList
      summary: List model-authored checkpoints for a conversation
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkpoints (oldest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  checkpoints:
                    type: array
                    items:
                      type: object
                      properties:
                        summary:
                          type: string
                        decisions:
                          type: array
                          items:
                            type: string
                        next_step:
                          type: string
                        created_at:
                          type: string
        '400':
          description: conversation_id missing
    delete:
      tags: [Memory]
      operationId: memoryCheckpointsClear
      summary: Clear checkpoints for a conversation
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cleared count
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: integer
        '400':
          description: conversation_id missing

  /memory/user-history:
    post:
      tags: [Memory]
      operationId: memoryUserHistory
      summary: Browse the user's past turns + top facts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                limit:
                  type: integer
                channel:
                  type: string
      responses:
        '200':
          description: User history
          content:
            application/json:
              schema:
                type: object
                properties:
                  topic:
                    type: string
                    nullable: true
                  summary:
                    type: string
                    description: Cached cross-conversation recap of the user (refreshed during consolidation); empty until first built.
                  turn_count:
                    type: integer
                  user_turns:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: string
                        conversation_id:
                          type: string
                        content:
                          type: string
                  facts:
                    type: array
                    items:
                      type: object
                      properties:
                        claim:
                          type: string
                        confidence:
                          type: number
        '500':
          description: Recall failed
        '503':
          description: Memory system unavailable

  /memory/consolidate:
    post:
      tags: [Memory]
      operationId: memoryConsolidate
      summary: Trigger the consolidation pipeline
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobs:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Consolidation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/consolidate/stream:
    get:
      tags: [Memory]
      operationId: memoryConsolidateStream
      summary: Consolidation progress (SSE)
      description: Responds with `text/event-stream` reporting consolidation progress.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /memory/reset:
    post:
      tags: [Memory]
      operationId: memoryReset
      summary: Reset consolidation timestamps (optionally delete memories)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                delete_memories:
                  type: boolean
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/export:
    post:
      tags: [Memory]
      operationId: memoryExport
      summary: Export the user's memory graph to a round-trippable JSON envelope
      description: >
        Serializes conversations/turns, facts/entities, strategies, goals and
        tool-invocations (plus the PostgreSQL audit mirror) keyed by stable ids.
        Exports are text-only — embeddings are regenerated from text on import,
        so files are small, deterministic and diffable.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                  description: Channel to export, or "_all" (default) for every channel.
      responses:
        '200':
          description: The export envelope under "export"
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    type: object
                    additionalProperties: true

  /memory/import:
    post:
      tags: [Memory]
      operationId: memoryImport
      summary: Import a memory export (idempotent MERGE-on-id)
      description: >
        Restores an envelope produced by /memory/export. mode "merge" upserts
        and leaves other data untouched; "replace" wipes the target channel for
        the user first. Embeddings are restored verbatim when present and
        dimension-compatible, else recomputed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  description: The export envelope (the "export" object from /memory/export).
                  additionalProperties: true
                mode:
                  type: string
                  enum: [merge, replace]
                  default: merge
                channel:
                  type: string
                  description: Override the wipe scope for replace mode.
      responses:
        '200':
          description: Per-type import summary under "imported"
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                    additionalProperties: true
        '400':
          description: Missing envelope, bad mode, or unsupported schema_version

  /memory/settings:
    get:
      tags: [Memory]
      operationId: memorySettingsGet
      summary: Get consolidation settings
      description: >-
        Includes `settings_file_status` ({path, exists, error}) — health of the
        overrides file; `error` is non-null when a corrupt file forced the
        defaults fallback.
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Memory]
      operationId: memorySettingsUpdate
      summary: Update consolidation settings (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: >-
            Schema validation failed — the whole update is rejected (nothing
            persisted); `errors` maps each failing key to a message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  errors:
                    type: object
                    additionalProperties:
                      type: string

  /memory/recall-settings:
    get:
      tags: [Memory]
      operationId: recallSettingsGet
      summary: Get recall layer settings
      responses:
        '200':
          description: Recall settings
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Memory]
      operationId: recallSettingsUpdate
      summary: Update recall layer settings (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: >-
            Schema validation failed — the whole update is rejected (nothing
            persisted); `errors` maps each failing key to a message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  errors:
                    type: object
                    additionalProperties:
                      type: string

  /jobs:
    get:
      tags: [Jobs]
      operationId: jobsList
      summary: List consolidation jobs
      responses:
        '200':
          description: Jobs + worker status
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  worker:
                    type: object
                    additionalProperties: true

  /jobs/clear-stuck:
    post:
      tags: [Jobs]
      operationId: jobsClearStuck
      summary: Clear jobs stuck in the running state
      responses:
        '200':
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /jobs/{job_name}:
    get:
      tags: [Jobs]
      operationId: jobDetail
      summary: Job detail with recent history
      parameters:
        - $ref: '#/components/parameters/JobName'
      responses:
        '200':
          description: Job
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    $ref: '#/components/schemas/Job'
                  history:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_name}/run:
    post:
      tags: [Jobs]
      operationId: jobRun
      summary: Manually run a job
      parameters:
        - $ref: '#/components/parameters/JobName'
      responses:
        '200':
          description: Run result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /jobs/{job_name}/toggle:
    post:
      tags: [Jobs]
      operationId: jobToggle
      summary: Enable / disable a job
      parameters:
        - $ref: '#/components/parameters/JobName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Toggled
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /config:
    get:
      tags: [Config]
      operationId: configGet
      summary: Get runtime configuration (secrets redacted)
      responses:
        '200':
          description: Config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /settings/manifest:
    get:
      tags: [Config]
      operationId: settingsManifest
      summary: Settings Manifest — registry of every user-tunable setting
      description: >-
        Canonical machine-readable registry across the memory-settings and
        config stores: per key — store, type, default, current value (secrets
        redacted), write route, and model-role linkage. The substrate for the
        settings agent (explain/suggest/validate).
      responses:
        '200':
          description: Manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: integer
                  generated_at:
                    type: string
                  counts:
                    type: object
                    additionalProperties:
                      type: integer
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        store:
                          type: string
                          enum: [memory, config]
                        type:
                          type: string
                        default: {}
                        value: {}
                        secret:
                          type: boolean
                        writable_via:
                          type: string
                          nullable: true
                        role_member:
                          type: string
                        role:
                          type: string

  /config/update:
    post:
      tags: [Config]
      operationId: configUpdate
      summary: Update runtime configuration
      description: >-
        Sectioned partial update. `models` accepts only `roles.{fast_utility,
        deep_reasoning,summarizer}` — each "" (clear) or a concrete
        provider:model (`role:` refs and non-`provider:model` strings 400).
        `images` and `vision` accept their whitelisted keys. The Conversation
        Context family (Settings → Memory → Conversation Context) is
        allowlisted per section — `context` (`verbatim_budget_ratio`,
        `summary_trigger_ratio`, `recent_floor`, `preassembly_summary_enabled`,
        `conversation_state_enabled`, `conversation_state_compaction_enabled`,
        `rehydrate_max_turns`, `max_input_tokens`), `session.rolling_summary`
        (`enabled`, `model`, `max_tokens`), `trajectory_compression`
        (`enabled`, `threshold_ratio`, `preserve_recent_rounds`, `model`,
        `max_knowledge_chars`), `compression` (`enabled`, `model`,
        `max_summary_chars`), `memory` (`episodic_leads_enabled`,
        `project_channels`), and `reasoning` (Thinking Patterns —
        allowlisted per-pattern enables, classifier/step-back/sampling
        models, `sc_k`, `min_output_tokens`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  updated:
                    type: array
                    items:
                      type: string

  /config/context-limits:
    get:
      tags: [Config]
      operationId: contextLimits
      summary: Per-model context-window limits
      responses:
        '200':
          description: Context limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextLimits'

  /logs:
    get:
      tags: [Logs]
      operationId: logsRecent
      summary: Recent log records from the in-memory ring buffer
      description: >-
        Read-only view over the server's ring buffer. Gated by
        `AGENTX_LOG_API_ENABLED`; auth-gated when `AGENTX_AUTH_ENABLED`.
      parameters:
        - { name: level, in: query, schema: { type: string }, description: 'Filter by level (DEBUG/INFO/WARNING/ERROR)' }
        - { name: category, in: query, schema: { type: string }, description: 'Filter by category key (provider/memory/stream/…)' }
        - { name: run_id, in: query, schema: { type: string }, description: 'Filter to one chat run' }
        - { name: search, in: query, schema: { type: string }, description: 'Case-insensitive substring match' }
        - { name: since, in: query, schema: { type: integer }, description: 'Only records with id greater than this' }
        - { name: limit, in: query, schema: { type: integer, default: 500 } }
      responses:
        '200':
          description: Log records
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: { type: boolean }
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        ts: { type: number }
                        level: { type: string }
                        logger: { type: string }
                        category: { type: string }
                        run_id: { type: string, nullable: true }
                        conversation_id: { type: string, nullable: true }
                        agent_id: { type: string, nullable: true }
                        message: { type: string }
                        exc: { type: string }
        '404': { description: Log API disabled }

  /logs/stream:
    get:
      tags: [Logs]
      operationId: logsStream
      summary: Live log tail (SSE)
      description: >-
        Replays the current buffer then follows live. Emits `log` events (one
        record each) plus heartbeat comments. Content-Type `text/event-stream`.
      responses:
        '200': { description: SSE stream of log events }
        '404': { description: Log API disabled }
        '503': { description: Too many concurrent subscribers }

  /logs/categories:
    get:
      tags: [Logs]
      operationId: logsCategories
      summary: Log category registry (client color map)
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        label: { type: string }
                        emoji: { type: string }
                        color: { type: string }

  /logs/archive:
    get:
      tags: [Logs]
      operationId: logsArchiveList
      summary: List daily log archive segments
      responses:
        '200':
          description: Archive segments
          content:
            application/json:
              schema:
                type: object
                properties:
                  segments:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        size: { type: integer }
                        modified: { type: number }
                        compressed: { type: boolean }
                        encrypted:
                          type: boolean
                          description: Sealed (AES-256-GCM) segment; decrypted on download.
        '404': { description: Log API disabled }

  /logs/archive/status:
    get:
      tags: [Logs]
      operationId: logsArchiveStatus
      summary: Log-archive encryption / vault state
      description: >-
        Whether sealed segments are downloadable right now (i.e. a key is cached
        in server memory), plus sealed/pending counts and retention. Lets the Log
        panel show vault state before a download is attempted.
      responses:
        '200':
          description: Vault status
          content:
            application/json:
              schema:
                type: object
                properties:
                  keyring_present: { type: boolean }
                  unlocked: { type: boolean, description: Key cached in memory; sealed segments downloadable }
                  sealed_segments: { type: integer }
                  pending_segments: { type: integer }
                  encryption_enabled: { type: boolean }
                  retention_days: { type: integer }
                  created_at: { type: string, nullable: true }
                  rotated_at: { type: string, nullable: true }
        '404': { description: Log API disabled }

  /logs/archive/{name}:
    get:
      tags: [Logs]
      operationId: logsArchiveDownload
      summary: Download a single archive segment
      description: >-
        Sealed `.enc` segments are decrypted on the fly with the in-memory key
        (populated at login) and returned as the inner gzip. Pass `?raw=true` to
        download the encrypted bytes untouched.
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
        - { name: raw, in: query, required: false, schema: { type: boolean }, description: Download encrypted bytes without decrypting }
      responses:
        '200': { description: The archive file (gzip or plain text) }
        '404': { description: Segment not found or log API disabled }
        '422': { description: Segment could not be decrypted (tampered or wrong key) }
        '423': { description: Encrypted-log vault is locked; re-authenticate to unlock }

components:
  securitySchemes:
    SessionToken:
      type: apiKey
      in: header
      name: X-Auth-Token
      description: >-
        Session token from `/auth/login`. Required on non-public routes only when
        `AGENTX_AUTH_ENABLED=true`.

  parameters:
    ServerName:
      name: name
      in: path
      required: true
      schema:
        type: string
    ProfileId:
      name: profile_id
      in: path
      required: true
      schema:
        type: string
    WorkflowId:
      name: workflow_id
      in: path
      required: true
      schema:
        type: string
    TemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    EntityId:
      name: entity_id
      in: path
      required: true
      schema:
        type: string
    FactId:
      name: fact_id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    JobName:
      name: job_name
      in: path
      required: true
      schema:
        type: string
    StorageKey:
      name: storage_key
      in: path
      required: true
      schema:
        type: string
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: string
    ChannelName:
      name: name
      in: path
      required: true
      schema:
        type: string
    ChannelQuery:
      name: channel
      in: query
      required: false
      schema:
        type: string
        default: _all
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Missing required field: text"
        status:
          type: string
          example: error

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        api:
          type: object
          additionalProperties: true
        translation:
          type: object
          additionalProperties: true
        compute:
          type: object
          description: Resolved compute device (device, cuda_available).
          additionalProperties: true
        embeddings:
          type: object
          nullable: true
          description: Embedding engine (provider, model, dimensions).
          additionalProperties: true
        memory:
          type: object
          description: Present only when include_memory=true.
          additionalProperties: true
        version:
          type: string
        protocol_version:
          type: integer

    VersionInfo:
      type: object
      properties:
        version:
          type: string
          example: "0.20.0"
        protocol_version:
          type: integer
          example: 1
        min_client_version:
          type: string
          example: "0.20.0"

    AuthStatus:
      type: object
      properties:
        auth_required:
          type: boolean
        setup_required:
          type: boolean
        auth_bypass_active:
          type: boolean

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        username:
          type: string

    SessionInfo:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        session_created:
          type: string
          format: date-time
        last_active:
          type: string
          format: date-time

    LanguageDetectResult:
      type: object
      properties:
        original:
          type: string
        detected_language:
          type: string
          description: ISO 639-1 code
          example: fr
        confidence:
          type: number
          format: float
          example: 98.5

    TranslateResult:
      type: object
      properties:
        original:
          type: string
        translatedText:
          type: string
        targetLanguage:
          type: string

    McpServer:
      type: object
      properties:
        name:
          type: string
        transport:
          type: string
          enum: [stdio, sse, streamable_http]
        status:
          type: string
        tools:
          type: array
          items:
            type: string
        tools_count:
          type: integer
        resources_count:
          type: integer
        auth:
          type: object
          nullable: true
          description: >-
            OAuth 2.1 config for remote transports — type (always "oauth") plus optional
            scope / client_id / client_secret; no client_id → RFC 7591 dynamic registration.
          properties:
            type: { type: string, enum: [oauth] }
            scope: { type: string }
            client_id: { type: string }
            client_secret: { type: string }
        auth_state:
          type: object
          nullable: true
          description: OAuth lifecycle state (null for non-OAuth servers).
          properties:
            authorized: { type: boolean }
            expired:
              type: boolean
              nullable: true
              description: >-
                Access token past its persisted expiry; null when the expiry is
                unknown (legacy token file or provider without expires_in).
            refreshable:
              type: boolean
              description: A refresh_token is stored — an expired session reconnects headlessly.
            pending: { type: boolean }
            error: { type: string, nullable: true }

    McpTool:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        server:
          type: string
        input_schema:
          type: object
          additionalProperties: true

    McpResource:
      type: object
      properties:
        uri:
          type: string
        name:
          type: string
        server:
          type: string

    McpRegistryResult:
      type: object
      description: >-
        One flattened entry from the official MCP registry (untrusted — prefill
        only). remotes/packages mirror the registry's server.json shape.
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        repository_url:
          type: string
          nullable: true
        remotes:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              url: { type: string }
        packages:
          type: array
          items:
            type: object
            properties:
              registry_type: { type: string }
              identifier: { type: string }
              runtime_hint: { type: string, nullable: true }

    AgentSkill:
      type: object
      description: >-
        A named instruction pack. Agents see a compact index (id — name:
        description) in their system prompt and load the body on demand via
        the use_skill internal tool. allowed_agent_ids mirrors MCP servers:
        null = all agents, [] = none, else an agent_id whitelist.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        allowed_agent_ids:
          type: array
          nullable: true
          items:
            type: string
        created_at:
          type: string
          nullable: true
        updated_at:
          type: string
          nullable: true

    AgentSkillInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        allowed_agent_ids:
          type: array
          nullable: true
          items:
            type: string

    Provider:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          example: configured
        models:
          type: array
          items:
            type: string
        error:
          type: string
          nullable: true

    Model:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        context_window:
          type: integer
        supports_tools:
          type: boolean
        supports_vision:
          type: boolean
        supports_streaming:
          type: boolean
        cost_per_1k_input:
          type: number
          format: float
          nullable: true
        cost_per_1k_output:
          type: number
          format: float
          nullable: true

    AgentRunResult:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
        answer:
          type: string
        plan_steps:
          type: integer
        reasoning_steps:
          type: integer
        tools_used:
          type: array
          items:
            type: string
        models_used:
          type: array
          items:
            type: string
        total_tokens:
          type: integer
        total_time_ms:
          type: number
          format: float

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        session_id:
          type: string
        model:
          type: string
        profile_id:
          type: string
        agent_profile_id:
          type: string
        temperature:
          type: number
          format: float
          default: 0.7
        use_memory:
          type: boolean
          default: true
        workspace_id:
          type: string
          description: Optional attached document workspace (Document RAG).
        images:
          type: array
          description: >-
            Vision input — refs to images already uploaded via `/agent/chat/images`. A
            vision-capable model receives them as image blocks; a non-vision model gets the
            text only (a `status` notice is emitted). An image-only turn may send an empty
            `message`.
          items:
            $ref: '#/components/schemas/ChatImageRef'

    ChatImageRef:
      type: object
      required: [workspace_id, doc_id, media_type]
      properties:
        workspace_id:
          type: string
        doc_id:
          type: string
        media_type:
          type: string
          enum: [image/png, image/jpeg, image/webp, image/gif]

    ChatResponse:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
        response:
          type: string
        answer:
          type: string
        thinking:
          type: string
        has_thinking:
          type: boolean
        session_id:
          type: string
        reasoning_steps:
          type: integer
        total_tokens:
          type: integer
        total_time_ms:
          type: number
          format: float

    BackgroundJob:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, running, complete, failed]
        message:
          type: string
        result:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ToolOutputMeta:
      type: object
      properties:
        storage_key:
          type: string
        tool:
          type: string
        size:
          type: integer
        created_at:
          type: string
          format: date-time

    Workspace:
      type: object
      description: A file workspace — surfaces to the user as a **Project** (files + instructions + conversations).
      properties:
        id:
          type: string
        name:
          type: string
        user_id:
          type: string
        description:
          type: string
          description: Project description shown in the hub (max 500 chars).
        instructions:
          type: string
          description: Project instructions injected into every chat turn (max 8000 chars).
        allow_shell:
          type: boolean
          description: Per-workspace opt-in for sandboxed agent shell tools (default false).
        shell_backend:
          type: string
          enum: [bubblewrap, container]
          description: Which shell sandbox this workspace uses (default bubblewrap).
        document_count:
          type: integer
        used_bytes:
          type: integer
          description: Total bytes of documents in the workspace (vs the configured quota).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspaceDocument:
      type: object
      properties:
        id:
          type: string
        workspace_id:
          type: string
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        sha256:
          type: string
        tags:
          type: array
          items:
            type: string
          description: Auto-generated topic tags (manifest enrichment).
        summary:
          type: string
          description: Auto-generated one-to-two sentence description.
        status:
          type: string
          enum: [pending, ready, failed]
          description: Ingestion status (parse → chunk → embed → enrich).
        error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentProfile:
      type: object
      required: [name]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [agent, ambassador]
          description: >-
            Profile kind. 'agent' = a chat agent; 'ambassador' = a parallel
            conversation interpreter (hidden from chat/delegation/@-mention).
        is_default_ambassador:
          type: boolean
          description: Whether this is the default ambassador (per-kind default).
        agent_id:
          type: string
          description: Immutable Docker-style identifier (read-only after creation).
        avatar:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        tags:
          type: array
          description: Up to 4 short trait/role labels shown in the agent selector.
          items:
            type: string
        default_model:
          type: string
        temperature:
          type: number
          format: float
        prompt_profile_id:
          type: string
          nullable: true
        system_prompt:
          type: string
          nullable: true
        reasoning_strategy:
          type: string
        enable_memory:
          type: boolean
        memory_channel:
          type: string
        enable_tools:
          type: boolean
        direct_mode:
          type: boolean
          description: >-
            When true, the model receives only the user message — no system
            prompt, memory, or tools. Auto-forced server-side for image-only
            models (output_modalities includes image but not text).
        allowed_tools:
          type: array
          nullable: true
          items:
            type: string
        blocked_tools:
          type: array
          items:
            type: string
        available_for_delegation:
          type: boolean
          default: false
          description: >-
            When true, this profile is on the ad-hoc delegation roster — other
            agents may hand it subtasks via `delegate_to`. Opt-in (default
            false); the UI calls this "Join the team roster".
        delegation_hint:
          type: string
          nullable: true
          description: >-
            One-line specialty shown to teammates deciding whom to delegate
            to (roster prompt + `delegate_to` target list). Falls back to
            `description` when unset. Trimmed; max 200 chars.
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    Workflow:
      type: object
      required: [id, name, supervisor_agent_id, members]
      properties:
        id:
          type: string
          description: Kebab-case identifier.
        name:
          type: string
        description:
          type: string
          nullable: true
        supervisor_agent_id:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowMember'
        routes:
          type: array
          description: Declarative routing — schema only in v1, not executed.
          items:
            $ref: '#/components/schemas/WorkflowRoute'
        shared_channel:
          type: string
          description: Auto-derived as `_alloy_{id}` when blank.
        canvas:
          type: object
          description: Opaque Factory editor state; no backend semantics.
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    WorkflowMember:
      type: object
      required: [agent_id, role]
      properties:
        agent_id:
          type: string
        role:
          type: string
          enum: [supervisor, specialist]
        delegation_hint:
          type: string
          nullable: true

    WorkflowRoute:
      type: object
      properties:
        from_agent_id:
          type: string
        to_agent_id:
          type: string
        when:
          type: string

    PromptProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        is_default:
          type: boolean
        sections:
          type: array
          items:
            $ref: '#/components/schemas/PromptSection'

    PromptSection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [persona, task, format, constraints, examples, context, custom, system]
        content:
          type: string
        enabled:
          type: boolean
        order:
          type: integer

    GlobalPrompt:
      type: object
      properties:
        content:
          type: string
        enabled:
          type: boolean

    PromptLayer:
      type: object
      description: One editable block in the layered global-prompt stack.
      properties:
        id:
          type: string
        title:
          type: string
        kind:
          type: string
          enum: [builtin, custom]
        default:
          type: string
          nullable: true
          description: Shipped default (built-ins only); the sidecar
        default_version:
          type: integer
        override:
          type: string
          nullable: true
          description: User edit; null means "use the default"
        base_version:
          type: integer
          nullable: true
        effective:
          type: string
          description: override ?? default — what actually ships
        enabled:
          type: boolean
        order:
          type: integer
        modified:
          type: boolean
        update_available:
          type: boolean
          description: A release changed the default underneath the user's override

    PromptTemplate:
      type: object
      required: [name, content]
      properties:
        id:
          type: string
        name:
          type: string
        content:
          type: string
        default_content:
          type: string
        tags:
          type: array
          items:
            type: string
        placeholders:
          type: array
          items:
            type: string
        type:
          type: string
          enum: [system, user, snippet]
        is_builtin:
          type: boolean
        description:
          type: string
        has_modifications:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    Conversation:
      type: object
      properties:
        conversation_id:
          type: string
        title:
          type: string
          description: >-
            Custom title (`conversation_meta`) when set, else derived from the
            first user message (truncated).
        preview:
          type: string
        created_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time
        message_count:
          type: integer
        channel:
          type: string
        workspace_id:
          type: string
          nullable: true
          description: The project (workspace) this conversation belongs to, if any.
        archived:
          type: boolean
          description: Excluded from listings by default (see `include_archived`).
        first_user_message:
          type: string
        last_message:
          type: string

    Message:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
        turn_index:
          type: integer
        timestamp:
          type: string
          format: date-time

    StateEntry:
      type: object
      properties:
        text:
          type: string
        author:
          type: string
          enum: [user, agent]
        source_turn:
          type: integer
          nullable: true
        updated_at:
          type: string
          format: date-time

    ConversationState:
      type: object
      description: Slot-based structured working memory for a conversation.
      properties:
        goals: { type: array, items: { $ref: '#/components/schemas/StateEntry' } }
        decisions: { type: array, items: { $ref: '#/components/schemas/StateEntry' } }
        open_threads: { type: array, items: { $ref: '#/components/schemas/StateEntry' } }
        artifacts: { type: array, items: { $ref: '#/components/schemas/StateEntry' } }
        narrative: { type: array, items: { $ref: '#/components/schemas/StateEntry' } }

    ConversationStateResponse:
      type: object
      properties:
        conversation_id:
          type: string
        state:
          $ref: '#/components/schemas/ConversationState'

    MemoryChannel:
      type: object
      properties:
        name:
          type: string
        is_default:
          type: boolean
        item_counts:
          type: object
          additionalProperties:
            type: integer

    MemoryEntity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        channel:
          type: string
        salience:
          type: number
          format: float
        attributes:
          type: object
          additionalProperties: true

    Fact:
      type: object
      properties:
        id:
          type: string
        claim:
          type: string
        confidence:
          type: number
          format: float
        channel:
          type: string
        temporal_context:
          type: string
          enum: [current, past, future]
        source_turn_id:
          type: string
          nullable: true
        access_count:
          type: integer
        entity_ids:
          type: array
          description: IDs of entities this fact is ABOUT.
          items:
            type: string
        entities:
          type: array
          description: Entities this fact is ABOUT — powers the Mentioned entities section.
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              type: { type: string }

    Strategy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        channel:
          type: string
        success_rate:
          type: number
          format: float

    MemoryStats:
      type: object
      properties:
        totals:
          type: object
          additionalProperties:
            type: integer
        by_channel:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer

    Job:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [idle, running, disabled]
        enabled:
          type: boolean
        last_run:
          type: string
          format: date-time
          nullable: true
        last_duration_ms:
          type: integer
        run_count:
          type: integer

    ContextLimits:
      type: object
      description: Resolved context-window limit per configured model.
      additionalProperties:
        type: integer
