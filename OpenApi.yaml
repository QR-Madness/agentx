openapi: 3.0.3
info:
  title: AgentX AI API
  description: >-
    REST API for the AgentX AI platform — translation, agents, reasoning, MCP tools, model
    providers, prompts, multi-agent workflows, persistent memory, background jobs, and config.


    Authentication is optional and disabled by default. When `AGENTX_AUTH_ENABLED=true`, every
    route except the public bootstrap endpoints (`/health`, `/version`, `/auth/login`,
    `/auth/status`, `/auth/setup`) requires a session token in the `X-Auth-Token` header (see
    the `SessionToken` security scheme).


    Narrative guides live in the documentation site (`docs-site/`); this spec is the
    machine-readable mirror of `docs-site/src/content/docs/api/endpoints.md`.
  version: 0.20.0
  license:
    name: MIT
    url: https://github.com/QR-Madness/agentx/blob/main/LICENSE

servers:
  - url: http://localhost:12319/api
    description: Local development server (gateway deployments prepend their public host)

tags:
  - name: Core
    description: Health, version, and index.
  - name: Auth
    description: Optional single-user session authentication (Phase 17).
  - name: Translation
    description: Language detection and NLLB-200 translation.
  - name: MCP
    description: Model Context Protocol servers, tools, and resources.
  - name: Providers
    description: Model provider registry and health.
  - name: Agent
    description: Task execution and conversational chat.
  - name: Background Chat
    description: Queued, pollable conversations.
  - name: Tool Outputs
    description: Stored oversized tool outputs.
  - name: Agent Profiles
    description: Per-agent identity and settings.
  - name: Multi-Agent
    description: Agent Alloy supervisor/specialist workflows.
  - name: Prompts
    description: Prompt profiles, sections, global prompt, composition.
  - name: Prompt Templates
    description: Reusable prompt templates and the prompt enhancer.
  - name: Conversations
    description: Stored conversation history.
  - name: Memory
    description: Channels, entities, facts, strategies, stats, consolidation, settings.
  - name: Jobs
    description: Background consolidation job monitoring.
  - name: Config
    description: Runtime configuration.

# Auth is optional and off by default: every operation accepts either no auth or a session
# token. When AGENTX_AUTH_ENABLED=true the token becomes mandatory on all routes except the
# public bootstrap endpoints (health, version, auth login/status/setup).
security:
  - {}
  - SessionToken: []

paths:
  /index:
    get:
      tags: [Core]
      operationId: index
      summary: Index
      responses:
        '200':
          description: Greeting
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello, AgentX AI!"

  /health:
    get:
      tags: [Core]
      operationId: health
      summary: Health check
      parameters:
        - name: include_memory
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include memory system health (neo4j, postgres, redis).
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /version:
    get:
      tags: [Core]
      operationId: version
      summary: API + protocol version
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'

  /auth/status:
    get:
      tags: [Auth]
      operationId: authStatus
      summary: Whether auth is enabled and setup is complete
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
    post:
      tags: [Auth]
      operationId: authStatusPost
      summary: Whether auth is enabled and setup is complete (POST form)
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'

  /auth/setup:
    post:
      tags: [Auth]
      operationId: authSetup
      summary: Set the initial root password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirm_password]
              properties:
                password:
                  type: string
                  minLength: 8
                confirm_password:
                  type: string
      responses:
        '200':
          description: Password configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Log in with the root password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: root
                password:
                  type: string
      responses:
        '200':
          description: Session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Initial setup required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Destroy the current session
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/session:
    get:
      tags: [Auth]
      operationId: authSession
      summary: Validate / inspect the current session
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      tags: [Auth]
      operationId: authChangePassword
      summary: Change the root password (invalidates other sessions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tools/language-detect-20:
    get:
      tags: [Translation]
      operationId: languageDetectGet
      summary: Detect language (query form)
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageDetectResult'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Translation]
      operationId: languageDetect
      summary: Detect language of text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  example: "Bonjour, comment allez-vous?"
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageDetectResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /tools/translate:
    post:
      tags: [Translation]
      operationId: translate
      summary: Translate text (NLLB-200)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, targetLanguage]
              properties:
                text:
                  type: string
                  example: "Hello, world!"
                targetLanguage:
                  type: string
                  description: NLLB code (e.g. fra_Latn) or ISO 639-1 (e.g. fr).
                  example: "fra_Latn"
                sourceLanguage:
                  type: string
                  description: Optional; auto-detected if omitted.
      responses:
        '200':
          description: Translation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mcp/servers:
    get:
      tags: [MCP]
      operationId: mcpServers
      summary: List configured MCP servers and status
      responses:
        '200':
          description: Servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpServer'

  /mcp/servers/validate:
    post:
      tags: [MCP]
      operationId: mcpServerValidate
      summary: Validate a server config without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'

  /mcp/servers/{name}:
    get:
      tags: [MCP]
      operationId: mcpServerDetail
      summary: Get one server's config + live status
      parameters:
        - $ref: '#/components/parameters/ServerName'
      responses:
        '200':
          description: Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServer'
        '404':
          $ref: '#/components/responses/NotFound'

  /mcp/tools:
    get:
      tags: [MCP]
      operationId: mcpTools
      summary: List available MCP tools
      parameters:
        - name: server
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpTool'

  /mcp/resources:
    get:
      tags: [MCP]
      operationId: mcpResources
      summary: List available MCP resources
      parameters:
        - name: server
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Resources
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpResource'

  /mcp/connect:
    post:
      tags: [MCP]
      operationId: mcpConnect
      summary: Connect to one or all MCP servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: string
                all:
                  type: boolean
      responses:
        '200':
          description: Connection result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /mcp/disconnect:
    post:
      tags: [MCP]
      operationId: mcpDisconnect
      summary: Disconnect one or all MCP servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: string
                all:
                  type: boolean
      responses:
        '200':
          description: Disconnection result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /providers:
    get:
      tags: [Providers]
      operationId: providersList
      summary: List configured providers
      responses:
        '200':
          description: Providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Provider'

  /providers/models:
    get:
      tags: [Providers]
      operationId: providersModels
      summary: List available models with capabilities
      parameters:
        - name: provider
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Models
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
                  count:
                    type: integer

  /providers/health:
    get:
      tags: [Providers]
      operationId: providersHealth
      summary: Health-check all providers
      responses:
        '200':
          description: Provider health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded]
                  providers:
                    type: object
                    additionalProperties: true

  /agent/run:
    post:
      tags: [Agent]
      operationId: agentRun
      summary: Execute a task (planning + reasoning)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task:
                  type: string
                reasoning_strategy:
                  type: string
                  enum: [auto, cot, tot, react, reflection]
      responses:
        '200':
          description: Task result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResult'

  /agent/chat:
    post:
      tags: [Agent]
      operationId: agentChat
      summary: Conversational chat (non-streaming)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /agent/chat/stream:
    post:
      tags: [Agent]
      operationId: agentChatStream
      summary: Conversational chat (SSE streaming)
      description: >-
        Same body as `/agent/chat`, plus an optional `workflow_id` to run an Agent Alloy
        workflow and an optional `target_agent_id` to route the turn to a specific agent by
        its Docker-style `agent_id`. Responds with `text/event-stream`. The run is executed detached
        server-side and survives client disconnect; the first event is `run_started`
        (carrying `run_id`) so the client can re-attach via `/agent/chat/stream/attach`.
        Events: `run_started`, `start`, `memory_context`, `chunk`, `status`, `steer`,
        `tool_call`, `tool_result`, `exhibit`, `done`, `close`, plus `delegation_*` events
        when a workflow is active. See the Multi-Agent docs for delegation event shapes.
        The `status` event (`{ phase, label, detail?, group?, progress? }`) is a coarse
        per-phase activity feed (`recalling`/`composing`/`thinking`/`running_tool`/`reading`)
        the client shows as a live line; it rides the run's event bus so it replays on
        re-attach. The `steer` event (`{ id, message }`) echoes a user message folded into
        the running turn via the steer endpoint (live steering).
        The `exhibit` event carries a declarative, agent-authored content tree
        (`{ schema_version, id, title?, layout, elements[] }`) emitted when the agent
        calls the internal `present_exhibit` tool. Element types: `mermaid` (a diagram),
        `choice` (interactive `options` the user picks from — the selection is sent as the
        user's next message, no new endpoint), `table` (sortable/scrollable/responsive/
        expandable `columns` + `rows`), and `citation` (`sources` split into `active`
        foldable references with a `quote` vs `passive` record-keeping links).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ChatRequest'
                - type: object
                  properties:
                    workflow_id:
                      type: string
                    target_agent_id:
                      type: string
                      description: >-
                        Route this turn to the agent with this Docker-style `agent_id`.
                        Resolution priority: `workflow_id` > `target_agent_id` >
                        `agent_profile_id` > default. An unknown id yields an SSE `error` event.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /agent/chat/stream/attach:
    get:
      tags: [Agent]
      operationId: agentChatAttach
      summary: Re-attach to a detached chat run
      description: >-
        Replays the buffered SSE events for a run from the start, then follows live
        until completion. Lets a reopened/closed-then-reopened tab resume an in-flight
        conversation. Emits a `run_missing` event when the run buffer has expired (TTL),
        signalling the client to restore from conversation history instead.
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Missing run_id

  /agent/chat/runs:
    get:
      tags: [Agent]
      operationId: agentChatRuns
      summary: List detached chat runs
      description: >-
        Lists the caller's detached chat runs (newest first), used by recovery
        surfaces (Relay inbox, conversation selector) to find runs whose owning
        tab was closed so they can be re-attached. Runs are indexed per user.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
      responses:
        '200':
          description: List of runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      type: object
                      properties:
                        run_id:
                          type: string
                        status:
                          type: string
                          description: running | done | failed | cancelled
                        message:
                          type: string
                          description: Truncated first-message label
                        session_id:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                        updated_at:
                          type: string
        '405':
          description: GET required

  /agent/chat/runs/{run_id}/cancel:
    post:
      tags: [Agent]
      operationId: agentChatRunCancel
      summary: Cancel a detached chat run
      description: >-
        Cooperative cancel — the detached runner checks the flag at SSE-event
        boundaries and stops pulling from the provider.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancellation requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  cancel_requested:
                    type: boolean
        '405':
          description: POST required

  /agent/ambassador/brief-turn:
    post:
      tags: [Agent]
      operationId: ambassadorBriefTurn
      summary: Brief one turn with the Ambassador (16.6)
      description: >-
        Start a parallel **Ambassador** briefing of a single conversation turn. The
        ambassador is a dedicated agent (any agent profile with an `ambassador`
        section; the global default is `config.ambassador.profile_id`) that runs
        *parallel* to the conversation and never pollutes it: it reads conversation
        context read-only and writes only to a Redis sidecar (the `ambassador:` key
        prefix), never `conversation_logs`. Runs detached and **un-indexed**
        (`indexed=False`) so it never appears in `/agent/chat/runs`. Returns the
        `run_id`; tail it via `/agent/ambassador/stream`. Cancel via
        `/agent/chat/runs/{run_id}/cancel`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, message_id, assistant_text]
              properties:
                conversation_id:
                  type: string
                message_id:
                  type: string
                  description: Stable client message id the briefing is keyed by
                assistant_text:
                  type: string
                  description: The assistant reply to brief
                user_text:
                  type: string
                  description: The preceding user message (turn prompt), for grounding
                agent_name:
                  type: string
                  description: Display name of the briefed agent, so the briefing speaks of it by name
                artifacts:
                  type: object
                  description: >-
                    What the agent actually did this turn (tools it ran, sources it
                    cited, exhibits it built), compacted client-side, so the briefing
                    grounds on the turn's substance rather than only its prose.
                  properties:
                    tools:
                      type: array
                      items:
                        type: object
                        properties:
                          name: { type: string }
                          detail: { type: string, description: Compact arg summary (query/url/path) }
                          ok: { type: boolean }
                          result: { type: string, description: Truncated result preview }
                    sources:
                      type: array
                      items:
                        type: object
                        properties:
                          label: { type: string }
                          url: { type: string }
                    exhibits:
                      type: array
                      items:
                        type: object
                        properties:
                          kind: { type: string, description: 'table | diagram | choice' }
                          title: { type: string }
                          detail: { type: string }
      responses:
        '200':
          description: Briefing run started
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
        '400':
          description: Missing required fields
        '405':
          description: POST required

  /agent/ambassador/ask:
    post:
      tags: [Agent]
      operationId: ambassadorAsk
      summary: Ask the Ambassador a free-form question (16.6)
      description: >-
        Start a parallel **Ambassador** Q&A run about a conversation. The ambassador
        answers the question grounded only in the conversation (read-only), streaming
        the answer and persisting it to the Redis sidecar under the `qa:` family —
        never `conversation_logs`. Runs detached + un-indexed (`indexed=False`), so it
        never appears in `/agent/chat/runs`. Returns `{run_id, qa_id}`; tail it via
        `/agent/ambassador/stream` (shared `ambassador_*` SSE, keyed by `qa_id`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, question]
              properties:
                conversation_id:
                  type: string
                qa_id:
                  type: string
                  description: Client-stable id the Q&A is keyed by (server generates one if absent)
                question:
                  type: string
                agent_name:
                  type: string
                  description: Display name of the conversation's agent, so the answer names it
                artifacts:
                  type: object
                  description: Latest-turn substance (tools/sources/exhibits), as extra grounding
      responses:
        '200':
          description: Q&A run started
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  qa_id:
                    type: string
        '400':
          description: Missing required fields
        '405':
          description: POST required

  /agent/ambassador/draft:
    post:
      tags: [Agent]
      operationId: ambassadorDraft
      summary: Draft an outbound relay message (16.6)
      description: >-
        The **outbound relay** (you → agent). The ambassador shapes a rough intent
        into a clear, first-person message the user will send to the agent, using the
        conversation for context. Returns `{draft}` for the user to review/edit; the
        ambassador never sends it (the client relays it as a real user turn). Degrades
        gracefully to the raw intent when no provider is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, intent]
              properties:
                conversation_id:
                  type: string
                intent:
                  type: string
                  description: The user's rough intent; shaped into a ready-to-send message
                agent_name:
                  type: string
                artifacts:
                  type: object
                  description: Latest-turn substance, as extra grounding
      responses:
        '200':
          description: Draft produced
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    type: string
        '400':
          description: Missing required fields
        '405':
          description: POST required

  /agent/ambassador/stream:
    get:
      tags: [Agent]
      operationId: ambassadorStream
      summary: Tail an Ambassador briefing run
      description: >-
        Replays then follows a briefing run's namespaced SSE events
        (`ambassador_start`, `ambassador_chunk`, `ambassador_done`,
        `ambassador_error`). Emits `run_missing` if the run buffer expired (client
        falls back to the persisted briefing from `/agent/ambassador/{conversation_id}`).
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Missing run_id

  /agent/ambassador/{conversation_id}:
    get:
      tags: [Agent]
      operationId: ambassadorBriefings
      summary: List a conversation's Ambassador briefings
      description: >-
        Replays all persisted per-turn briefings for a conversation from the sidecar
        so a cold/reopened panel repopulates after reload or tab-switch.
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Briefings
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation_id:
                    type: string
                  briefings:
                    type: array
                    items:
                      type: object
                      properties:
                        message_id:
                          type: string
                        status:
                          type: string
                          description: streaming | done | error | empty_provider | cancelled
                        summary:
                          type: string
                        error:
                          type: string
                          nullable: true
                        run_id:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                        updated_at:
                          type: string
        '405':
          description: GET required

  /agent/chat/runs/{run_id}/steer:
    post:
      tags: [Agent]
      operationId: agentChatRunSteer
      summary: Live-steer a running chat run
      description: >-
        Fold a message into an in-flight turn without stopping it. The message is
        queued; the streaming tool loop drains it at the next safe boundary (after
        a tool round, or instead of ending) and folds it in as a fresh user turn so
        the agent course-corrects. Owner-only. The message is echoed onto the run's
        event bus as a `steer` event so every connected client shows the steer
        bubble inline.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                mode:
                  type: string
                  enum: [queue]
                  default: queue
      responses:
        '200':
          description: Steer queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  steer_accepted:
                    type: boolean
        '400':
          description: Missing message / invalid body
        '403':
          description: Not the run owner
        '404':
          description: Run not found
        '409':
          description: Run is not active

  /agent/status:
    get:
      tags: [Agent]
      operationId: agentStatus
      summary: Current agent status
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, planning, reasoning, executing, complete, failed, cancelled]

  /agent/plans/cancel:
    post:
      tags: [Agent]
      operationId: agentPlanCancel
      summary: Cancel the active plan execution
      responses:
        '200':
          description: Cancellation requested
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /agent/plans/{plan_id}/status:
    get:
      tags: [Agent]
      operationId: agentPlanStatus
      summary: Read Redis-tracked plan execution state
      description: >
        Returns the live state of a plan from Redis (1h TTL) so a client can
        reconcile a persisted "running" plan after a reload. Returns
        `{ "found": false }` with HTTP 200 when the state has expired, rather
        than 404.
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
        - name: session_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Plan state (or not-found marker)
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  plan_id:
                    type: string
                  session_id:
                    type: string
                  status:
                    type: string
                    description: >
                      active | complete | cancelled | failed | interrupted.
                      active/interrupted are resumable (interrupted = hard-stopped
                      with work left).
                  task:
                    type: string
                  complexity:
                    type: string
                  subtask_count:
                    type: integer
                    nullable: true
                  completed_count:
                    type: integer
                    nullable: true
                  cancel_requested:
                    type: boolean
                  resumable:
                    type: boolean
                    description: >
                      True when the plan is active with non-terminal work left and
                      carries a structural snapshot — POST .../resume would continue it.
                  ttl_seconds:
                    type: integer
                    nullable: true
                    description: >
                      Seconds until the Redis snapshot expires (how long it stays
                      resumable); null when the key is missing or has no expiry.
                  subtasks:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          description: Missing session_id

  /agent/plans/{plan_id}/resume:
    post:
      tags: [Agent]
      operationId: agentPlanResume
      summary: Resume an interrupted plan
      description: >
        Rebuilds the plan from Redis (`PlanStateStore.load_plan`) and continues
        executing only its not-yet-terminal subtasks, streaming Server-Sent Events
        the same way the chat endpoint does (first event `plan_resumed`, then
        subtask events → `plan_complete` → `done`). The run is detached
        (survives client disconnect, re-attachable) and the final synthesis is
        persisted as an assistant turn. Single-agent only for now (alloy plan
        resumption is a follow-up). Returns 404 when the plan is not resumable
        (missing, expired, or already finished).
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
                agent_profile_id:
                  type: string
                model:
                  type: string
                temperature:
                  type: number
                  format: float
                use_memory:
                  type: boolean
                  default: true
      responses:
        '200':
          description: SSE stream of the resumed run
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Missing session_id or invalid JSON
        '404':
          description: Plan not resumable (missing, expired, or already finished)

