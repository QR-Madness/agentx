  /memory/channels/{name}:
    delete:
      tags: [Memory]
      operationId: memoryChannelDelete
      summary: Delete a channel and its data
      parameters:
        - $ref: '#/components/parameters/ChannelName'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/conversations/{conversation_id}:
    delete:
      tags: [Memory]
      operationId: memoryConversationDelete
      summary: Delete a conversation and its turns
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/entities:
    get:
      tags: [Memory]
      operationId: memoryEntities
      summary: List entities
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Entities (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      $ref: '#/components/schemas/MemoryEntity'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  has_next:
                    type: boolean

  /memory/entities/{entity_id}:
    get:
      tags: [Memory]
      operationId: memoryEntityDetail
      summary: Get one entity
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryEntity'
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/entities/{entity_id}/graph:
    get:
      tags: [Memory]
      operationId: memoryEntityGraph
      summary: Entity relationship graph
      parameters:
        - $ref: '#/components/parameters/EntityId'
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            default: 2
            maximum: 3
      responses:
        '200':
          description: Graph
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts:
    get:
      tags: [Memory]
      operationId: memoryFacts
      summary: List facts
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - name: min_confidence
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Facts (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  facts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Fact'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  has_next:
                    type: boolean

  /memory/facts/{fact_id}:
    get:
      tags: [Memory]
      operationId: memoryFactDetail
      summary: Get one fact
      parameters:
        - $ref: '#/components/parameters/FactId'
      responses:
        '200':
          description: Fact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fact'
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/remember:
    post:
      tags: [Memory]
      operationId: memoryFactRemember
      summary: Boost a fact's salience ("remember this")
      description: >-
        Raises the fact's salience so it survives memory decay and ranks higher
        in recall.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: number
                  description: Target salience, clamped to [0, 1] (default 0.9).
                  default: 0.9
      responses:
        '200':
          description: Updated fact
          content:
            application/json:
              schema:
                type: object
                properties:
                  fact:
                    $ref: '#/components/schemas/Fact'
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/forget:
    post:
      tags: [Memory]
      operationId: memoryFactForget
      summary: Forget a fact (soft-retire by default)
      description: >-
        Soft mode (default) marks the fact `temporal_context: past` and lowers
        its confidence + salience so recall de-prioritizes it, while preserving
        provenance. `hard: true` deletes the node permanently.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                hard:
                  type: boolean
                  description: Permanently delete instead of soft-retiring.
                  default: false
      responses:
        '200':
          description: Forget result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  mode:
                    type: string
                    enum: [soft, hard]
                  fact_id: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/entities:
    post:
      tags: [Memory]
      operationId: memoryFactLinkEntity
      summary: Link an entity to a fact (ABOUT edge)
      description: >-
        Creates a manual `(:Fact)-[:ABOUT {method:'manual'}]->(:Entity)` link.
        User-scoped on both nodes. Returns the fact's updated `{id,name,type}`
        entity list.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_id]
              properties:
                entity_id:
                  type: string
                  description: The entity to link this fact to.
      responses:
        '200':
          description: Updated entity list for the fact
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        type: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Memory]
      operationId: memoryFactUnlinkEntity
      summary: Unlink an entity from a fact
      description: >-
        Removes the `(:Fact)-[:ABOUT]->(:Entity)` link. User-scoped. Returns the
        fact's remaining `{id,name,type}` entity list.
      parameters:
        - $ref: '#/components/parameters/FactId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_id]
              properties:
                entity_id:
                  type: string
                  description: The entity to unlink from this fact.
      responses:
        '200':
          description: Remaining entity list for the fact
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        type: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/facts/{fact_id}/provenance:
    get:
      tags: [Memory]
      operationId: memoryFactProvenance
      summary: Where was this fact learned?
      description: >-
        Resolves the fact's `source_turn_id` to its originating conversation and
        turn snippet, when still on record.
      parameters:
        - $ref: '#/components/parameters/FactId'
      responses:
        '200':
          description: Provenance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  fact_id: { type: string }
                  claim: { type: string }
                  source: { type: string, nullable: true }
                  source_turn_id: { type: string, nullable: true }
                  origin:
                    type: object
                    nullable: true
                    properties:
                      conversation_id: { type: string }
                      role: { type: string }
                      timestamp: { type: string }
                      snippet: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /memory/strategies:
    get:
      tags: [Memory]
      operationId: memoryStrategies
      summary: List procedural strategies
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Strategies (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategies:
                    type: array
                    items:
                      $ref: '#/components/schemas/Strategy'
                  total:
                    type: integer

  /memory/procedures:
    get:
      tags: [Memory]
      operationId: memoryProcedures
      summary: List distilled procedures
      description: >
        Distilled procedural memory (Slice 1): the "how we work here" deltas the
        `distill_procedures` consolidation job mints from corrections/steers and
        explicit user rules. Each carries a natural-language trigger + replayable body.
      parameters:
        - $ref: '#/components/parameters/ChannelQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Procedures (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  procedures:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        trigger: { type: string }
                        body: { type: string }
                        rationale: { type: string }
                        scope: { type: string }
                        agent_id: { type: string, nullable: true }
                        strength: { type: integer }
                        signal_kinds:
                          type: array
                          items: { type: string }
                        evidence_refs:
                          type: array
                          items: { type: string }
                          description: "`cand:<id>` and `conv:<conversation_id>` provenance refs"
                        channel: { type: string }
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  has_next:
                    type: boolean

  /memory/stats:
    get:
      tags: [Memory]
      operationId: memoryStats
      summary: Memory statistics
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryStats'

  /metrics/usage:
    get:
      tags: [Memory]
      operationId: usageMetrics
      summary: Aggregated token/cost/latency usage
      description: >-
        Aggregates assistant turns from `conversation_logs` into overall totals,
        a per-model breakdown, and a daily time series for the last `days` days.
        Degrades gracefully (zeros + `unavailable: true`, HTTP 200) when the
        database is offline.
      parameters:
        - name: days
          in: query
          required: false
          description: Window size in days (clamped 1–90).
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 90
      responses:
        '200':
          description: Usage metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: object
                    properties:
                      turns: { type: integer }
                      tokens_input: { type: integer }
                      tokens_output: { type: integer }
                      tokens_total: { type: integer }
                      cost_total: { type: number }
                      cost_currency: { type: string }
                      avg_latency_ms: { type: number }
                  by_model:
                    type: array
                    items:
                      type: object
                      properties:
                        model: { type: string }
                        turns: { type: integer }
                        tokens_input: { type: integer }
                        tokens_output: { type: integer }
                        tokens_total: { type: integer }
                        cost_total: { type: number }
                  by_agent:
                    type: array
                    description: Per-agent breakdown grouped by `conversation_logs.agent_id`. NULL rows fall under the literal `_default`.
                    items:
                      type: object
                      properties:
                        agent_id: { type: string }
                        turns: { type: integer }
                        tokens_input: { type: integer }
                        tokens_output: { type: integer }
                        tokens_total: { type: integer }
                        cost_total: { type: number }
                  daily:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string }
                        turns: { type: integer }
                        tokens_total: { type: integer }
                        cost_total: { type: number }
                  days: { type: integer }
                  unavailable:
                    type: boolean
                    description: Present and true when databases are offline.

  /memory/checkpoints:
    get:
      tags: [Memory]
      operationId: memoryCheckpointsList
      summary: List model-authored checkpoints for a conversation
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkpoints (oldest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  checkpoints:
                    type: array
                    items:
                      type: object
                      properties:
                        summary:
                          type: string
                        decisions:
                          type: array
                          items:
                            type: string
                        next_step:
                          type: string
                        created_at:
                          type: string
        '400':
          description: conversation_id missing
    delete:
      tags: [Memory]
      operationId: memoryCheckpointsClear
      summary: Clear checkpoints for a conversation
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cleared count
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: integer
        '400':
          description: conversation_id missing

  /memory/user-history:
    post:
      tags: [Memory]
      operationId: memoryUserHistory
      summary: Browse the user's past turns + top facts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                limit:
                  type: integer
                channel:
                  type: string
      responses:
        '200':
          description: User history
          content:
            application/json:
              schema:
                type: object
                properties:
                  topic:
                    type: string
                    nullable: true
                  summary:
                    type: string
                    description: Cached cross-conversation recap of the user (refreshed during consolidation); empty until first built.
                  turn_count:
                    type: integer
                  user_turns:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: string
                        conversation_id:
                          type: string
                        content:
                          type: string
                  facts:
                    type: array
                    items:
                      type: object
                      properties:
                        claim:
                          type: string
                        confidence:
                          type: number
        '500':
          description: Recall failed
        '503':
          description: Memory system unavailable

  /memory/consolidate:
    post:
      tags: [Memory]
      operationId: memoryConsolidate
      summary: Trigger the consolidation pipeline
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobs:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Consolidation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/consolidate/stream:
    get:
      tags: [Memory]
      operationId: memoryConsolidateStream
      summary: Consolidation progress (SSE)
      description: Responds with `text/event-stream` reporting consolidation progress.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /memory/reset:
    post:
      tags: [Memory]
      operationId: memoryReset
      summary: Reset consolidation timestamps (optionally delete memories)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                delete_memories:
                  type: boolean
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/export:
    post:
      tags: [Memory]
      operationId: memoryExport
      summary: Export the user's memory graph to a round-trippable JSON envelope
      description: >
        Serializes conversations/turns, facts/entities, strategies, goals and
        tool-invocations (plus the PostgreSQL audit mirror) keyed by stable ids.
        Exports are text-only — embeddings are regenerated from text on import,
        so files are small, deterministic and diffable.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                  description: Channel to export, or "_all" (default) for every channel.
      responses:
        '200':
          description: The export envelope under "export"
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    type: object
                    additionalProperties: true

  /memory/import:
    post:
      tags: [Memory]
      operationId: memoryImport
      summary: Import a memory export (idempotent MERGE-on-id)
      description: >
        Restores an envelope produced by /memory/export. mode "merge" upserts
        and leaves other data untouched; "replace" wipes the target channel for
        the user first. Embeddings are restored verbatim when present and
        dimension-compatible, else recomputed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  description: The export envelope (the "export" object from /memory/export).
                  additionalProperties: true
                mode:
                  type: string
                  enum: [merge, replace]
                  default: merge
                channel:
                  type: string
                  description: Override the wipe scope for replace mode.
      responses:
        '200':
          description: Per-type import summary under "imported"
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                    additionalProperties: true
        '400':
          description: Missing envelope, bad mode, or unsupported schema_version

  /memory/settings:
    get:
      tags: [Memory]
      operationId: memorySettingsGet
      summary: Get consolidation settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Memory]
      operationId: memorySettingsUpdate
      summary: Update consolidation settings (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /memory/recall-settings:
    get:
      tags: [Memory]
      operationId: recallSettingsGet
      summary: Get recall layer settings
      responses:
        '200':
          description: Recall settings
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Memory]
      operationId: recallSettingsUpdate
      summary: Update recall layer settings (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

