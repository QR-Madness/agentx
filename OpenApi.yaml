                      $ref: '#/components/schemas/ToolOutputMeta'
                  count:
                    type: integer

  /tool-outputs/{storage_key}:
    get:
      tags: [Tool Outputs]
      operationId: toolOutputDetail
      summary: Retrieve a stored output
      parameters:
        - $ref: '#/components/parameters/StorageKey'
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: metadata_only
          in: query
