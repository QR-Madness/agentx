openapi: 3.0.3
info:
  title: AgentX AI API
  description: >-
    REST API for the AgentX AI platform — translation, agents, reasoning, MCP tools, model
    providers, prompts, multi-agent workflows, persistent memory, background jobs, and config.


    Authentication is optional and disabled by default. When `AGENTX_AUTH_ENABLED=true`, every
    route except the public bootstrap endpoints (`/health`, `/version`, `/auth/login`,
    `/auth/status`, `/auth/setup`) requires a session token in the `X-Auth-Token` header (see
    the `SessionToken` security scheme).


    Narrative guides live in the documentation site (`docs-site/`); this spec is the
    machine-readable mirror of `docs-site/src/content/docs/api/endpoints.md`.
  version: 0.20.0
  license:
    name: MIT
    url: https://github.com/QR-Madness/agentx/blob/main/LICENSE

servers:
  - url: http://localhost:12319/api
    description: Local development server (gateway deployments prepend their public host)

tags:
  - name: Core
    description: Health, version, and index.
  - name: Auth
    description: Optional single-user session authentication (Phase 17).
  - name: Translation
    description: Language detection and NLLB-200 translation.
  - name: MCP
    description: Model Context Protocol servers, tools, and resources.
  - name: Providers
    description: Model provider registry and health.
  - name: Agent
    description: Task execution and conversational chat.
  - name: Background Chat
    description: Queued, pollable conversations.
  - name: Tool Outputs
    description: Stored oversized tool outputs.
  - name: Workspaces
    description: File workspaces & document RAG (upload, manifest, retrieval).
  - name: Agent Profiles
    description: Per-agent identity and settings.
  - name: Skills
    description: Named instruction packs agents load on demand via the use_skill tool.
  - name: Multi-Agent
    description: Agent Alloy supervisor/specialist workflows.
  - name: Prompts
    description: Prompt profiles, sections, global prompt, composition.
  - name: Prompt Templates
    description: Reusable prompt templates and the prompt enhancer.
  - name: Conversations
    description: Stored conversation history.
  - name: Memory
    description: Channels, entities, facts, strategies, stats, consolidation, settings.
  - name: Jobs
    description: Background consolidation job monitoring.
  - name: Config
    description: Runtime configuration.

# Auth is optional and off by default: every operation accepts either no auth or a session
# token. When AGENTX_AUTH_ENABLED=true the token becomes mandatory on all routes except the
# public bootstrap endpoints (health, version, auth login/status/setup).
security:
  - {}
  - SessionToken: []

paths:
  /index:
    get:
      tags: [Core]
      operationId: index
      summary: Index
      responses:
        '200':
          description: Greeting
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello, AgentX AI!"

  /health:
    get:
      tags: [Core]
      operationId: health
      summary: Health check
      parameters:
        - name: include_memory
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include memory system health (neo4j, postgres, redis).
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /version:
    get:
      tags: [Core]
      operationId: version
      summary: API + protocol version
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'

  /auth/status:
    get:
      tags: [Auth]
      operationId: authStatus
      summary: Whether auth is enabled and setup is complete
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
    post:
      tags: [Auth]
      operationId: authStatusPost
      summary: Whether auth is enabled and setup is complete (POST form)
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'

  /auth/setup:
    post:
      tags: [Auth]
      operationId: authSetup
      summary: Set the initial root password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirm_password]
              properties:
                password:
                  type: string
                  minLength: 8
                confirm_password:
                  type: string
      responses:
        '200':
          description: Password configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Log in with the root password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: root
                password:
                  type: string
      responses:
        '200':
          description: Session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Initial setup required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Destroy the current session
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/session:
    get:
      tags: [Auth]
      operationId: authSession
      summary: Validate / inspect the current session
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      tags: [Auth]
      operationId: authChangePassword
      summary: Change the root password (invalidates other sessions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tools/language-detect-20:
    get:
      tags: [Translation]
      operationId: languageDetectGet
      summary: Detect language (query form)
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageDetectResult'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Translation]
      operationId: languageDetect
      summary: Detect language of text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  example: "Bonjour, comment allez-vous?"
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageDetectResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /tools/translate:
    post:
      tags: [Translation]
      operationId: translate
      summary: Translate text (NLLB-200)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, targetLanguage]
              properties:
                text:
                  type: string
                  example: "Hello, world!"
                targetLanguage:
                  type: string
                  description: NLLB code (e.g. fra_Latn) or ISO 639-1 (e.g. fr).
                  example: "fra_Latn"
                sourceLanguage:
                  type: string
                  description: Optional; auto-detected if omitted.
      responses:
        '200':
          description: Translation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tools/search-health:
    get:
      tags: [Providers]
      operationId: searchHealth
      summary: Probe the configured web-search backend
      description: >-
        Runs a trivial query against the active search backend (Tavily/Brave) to
        confirm it is configured and reachable. Powers the "Test connection"
        button in Settings → Web Search.
      responses:
        '200':
          description: Probe result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  backend:
                    type: string
                    nullable: true
                  count:
                    type: integer
                  error:
                    type: string
                    nullable: true
        '500':
          description: Probe failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mcp/servers:
    get:
      tags: [MCP]
      operationId: mcpServers
      summary: List configured MCP servers and status
      responses:
        '200':
          description: Servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpServer'

  /mcp/servers/validate:
    post:
      tags: [MCP]
      operationId: mcpServerValidate
      summary: Validate a server config without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'

  /mcp/servers/{name}:
    get:
      tags: [MCP]
      operationId: mcpServerDetail
      summary: Get one server's config + live status
      parameters:
        - $ref: '#/components/parameters/ServerName'
      responses:
        '200':
          description: Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServer'
        '404':
          $ref: '#/components/responses/NotFound'

  /mcp/registry/search:
    get:
      tags: [MCP]
      operationId: mcpRegistrySearch
      summary: Search the official MCP registry (server-side proxy)
      description: >-
        Proxies registry.modelcontextprotocol.io (active + latest entries only,
        flattened remotes/packages, ~15-minute cache). Results are untrusted
        input — clients use them only to prefill the Add Server form for user
        review.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Flattened registry results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpRegistryResult'
                  count:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          description: The public registry was unreachable

  /mcp/tools:
    get:
      tags: [MCP]
      operationId: mcpTools
      summary: List available MCP tools
      parameters:
        - name: server
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpTool'

  /mcp/resources:
    get:
      tags: [MCP]
      operationId: mcpResources
      summary: List available MCP resources
      parameters:
        - name: server
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Resources
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpResource'

  /mcp/connect:
    post:
      tags: [MCP]
      operationId: mcpConnect
      summary: Connect to one or all MCP servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: string
                all:
                  type: boolean
      responses:
        '200':
          description: Connection result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '202':
          description: >-
            OAuth server needs user consent. Open `authorization_url` in a browser;
            the connect completes in the background once the user authorizes (poll
            `GET /mcp/servers` for the transition to connected).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [auth_required] }
                  server: { type: string }
                  authorization_url: { type: string }

  /mcp/oauth/callback:
    get:
      tags: [MCP]
      operationId: mcpOauthCallback
      summary: OAuth 2.1 redirect target for remote MCP servers
      description: >-
        The loopback redirect URI (RFC 8252) the authorization server sends the user
        back to after consent. PUBLIC (the browser carries no auth token) — validated
        by the OAuth `state` instead; unknown/expired states resolve nothing (400).
        Returns a small human-readable HTML page. Override the advertised URL with
        `AGENTX_OAUTH_REDIRECT_URL` when the API is not on localhost:12319.
      security: []
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Authorization accepted — the connection completes in the background
          content:
            text/html:
              schema: { type: string }
        '400':
          description: Missing/unknown state, or the provider returned an error
          content:
            text/html:
              schema: { type: string }

  /mcp/servers/{name}/auth/reset:
    post:
      tags: [MCP]
      operationId: mcpServerAuthReset
      summary: Forget a server's OAuth tokens + dynamic registration
      description: Disconnects the server if connected and deletes its `data/mcp_oauth/` state — the next connect starts a fresh sign-in.
      parameters:
        - $ref: '#/components/parameters/ServerName'
      responses:
        '200':
          description: Reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  server: { type: string }
                  cleared: { type: boolean }
        '404':
          $ref: '#/components/responses/NotFound'

  /mcp/servers/{name}/auth/cancel:
    post:
      tags: [MCP]
      operationId: mcpServerAuthCancel
      summary: Cancel an in-flight OAuth sign-in
      description: >-
        Aborts a pending interactive browser consent flow server-side so a late
        completion can't flip the server to "signed in" after the user backed
        out. Any previously-stored tokens are left intact (use `auth/reset` to
        forget those).
      parameters:
        - $ref: '#/components/parameters/ServerName'
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  server: { type: string }
                  cancelled: { type: boolean, description: Whether a pending flow was actually aborted }
        '404':
          $ref: '#/components/responses/NotFound'

  /mcp/disconnect:
    post:
      tags: [MCP]
      operationId: mcpDisconnect
      summary: Disconnect one or all MCP servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: string
                all:
                  type: boolean
      responses:
        '200':
          description: Disconnection result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /providers:
    get:
      tags: [Providers]
      operationId: providersList
      summary: List configured providers
      responses:
        '200':
          description: Providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Provider'

  /providers/models:
    get:
      tags: [Providers]
      operationId: providersModels
      summary: List available models with capabilities
      parameters:
        - name: provider
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Models
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
                  count:
                    type: integer

  /providers/health:
    get:
      tags: [Providers]
      operationId: providersHealth
      summary: Health-check all providers
      responses:
        '200':
          description: Provider health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded]
                  providers:
                    type: object
                    additionalProperties: true

  /models/roles:
    get:
      tags: [Providers]
      operationId: modelsRoles
      summary: Model roles + membership + effective-model preview
      description: >-
        The three model roles (fast_utility, deep_reasoning, summarizer) with
        their configured models, plus every member's current resolution chain
        (explicit value / role model / effective model / what it's following).
        Set roles via POST /api/config/update {"models": {"roles": {...}}}.
      responses:
        '200':
          description: Roles and members
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        label:
                          type: string
                        description:
                          type: string
                        model:
                          type: string
                          description: Configured provider:model ("" = unset)
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        member:
                          type: string
                        label:
                          type: string
                        role:
                          type: string
                        kind:
                          type: string
                          enum: [memory, config]
                        source:
                          type: string
                        explicit:
                          type: string
                        role_model:
                          type: string
                        effective:
                          type: string
                        following:
                          type: string
                          enum: [explicit, role, fallback]

  /models/roles/adopt:
    post:
      tags: [Providers]
      operationId: modelsRolesAdopt
      summary: Clear consolidation-stage model overrides so each follows its role
      description: >-
        Resets the memory consolidation stage models (extraction, relevance,
        contradiction, correction, entity-linking, combined extraction,
        procedural distillation) to "inherit" so every stage follows its model
        role (fast_utility / deep_reasoning). Fresh installs already ship these
        as "inherit"; this lets an existing install adopt the family without
        hand-clearing each stage. Recall and document-summary members keep their
        own defaults and are not touched.
      responses:
        '200':
          description: Stages reset to inherit
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  adopted:
                    type: array
                    items:
                      type: string

  /agent/run:
    post:
      tags: [Agent]
      operationId: agentRun
      summary: Execute a task (planning + reasoning)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task:
                  type: string
                reasoning_strategy:
                  type: string
                  enum: [auto, cot, tot, react, reflection]
      responses:
        '200':
          description: Task result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResult'

  /agent/chat:
    post:
      tags: [Agent]
      operationId: agentChat
      summary: Conversational chat (non-streaming)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /agent/chat/stream:
    post:
      tags: [Agent]
      operationId: agentChatStream
      summary: Conversational chat (SSE streaming)
      description: >-
        Same body as `/agent/chat`, plus an optional `workflow_id` to run an Agent Alloy
        workflow and an optional `target_agent_id` to route the turn to a specific agent by
        its Docker-style `agent_id`. Responds with `text/event-stream`. The run is executed detached
        server-side and survives client disconnect; the first event is `run_started`
        (carrying `run_id`) so the client can re-attach via `/agent/chat/stream/attach`.
        Events: `run_started`, `start`, `memory_context`, `chunk`, `status`, `steer`,
        `tool_call`, `tool_result`, `exhibit`, `workspace_attached`, `done`, `close`, plus
        `delegation_*` and `work_order_report` events when a workflow is active or an
        ad-hoc delegation runs. See the Multi-Agent docs for delegation event shapes.
        `delegation_start`/`delegation_complete` carry `mode` (`await` for blocking
        `delegate_to`, `background` for `delegate_start` work orders) and
        `parent_delegation_id` (null at depth 0 — reserved for the delegation tree);
        `delegation_complete.status` is `success`, `failed`, or `cancelled` (a background
        work order cancelled with the run). A background `delegate_start` returns a
        dispatch-receipt tool result immediately and its report folds into the turn later
        as a user-role message — announced by `work_order_report`
        (`{ tool_call_id, delegation_id, target_agent_id, status, round, phase }`).
        `exhibit` and `workspace_attached`
        may also arrive DURING an active delegation (a specialist's generated image passes
        through top-level, rendering under the delegation card); `delegation_complete`
        carries an optional `exhibits` array (the wires, capped at 5) so restored
        conversations rebuild the cards. The `workspace_attached` event (`{ workspace_id }`)
        follows a generated `image` exhibit so a conversation with no workspace can durably
        attach the personal Home store the media fell back to.
        The `status` event (`{ phase, label, detail?, group?, progress? }`) is a coarse
        per-phase activity feed (`recalling`/`composing`/`thinking`/`running_tool`/`reading`)
        the client shows as a live line; it rides the run's event bus so it replays on
        re-attach. The `steer` event (`{ id, message }`) echoes a user message folded into
        the running turn via the steer endpoint (live steering).
        The `done` event carries context telemetry for the client's context chip:
        `context_window`/`context_used` (tokens), `context_summarized` (a rolling summary
        covers older turns) and `context_dropped_turns` (verbatim turns dropped by the
        ledger this turn; 0 when everything fit).
        The `exhibit` event carries a declarative, agent-authored content tree
        (`{ schema_version, id, title?, layout, elements[] }`) emitted when the agent
        calls the internal `present_exhibit` tool. Element types: `mermaid` (a diagram),
        `choice` (interactive `options` the user picks from — the selection is sent as the
        user's next message, no new endpoint), `table` (sortable/scrollable/responsive/
        expandable `columns` + `rows`), and `citation` (`sources` split into `active`
        foldable references with a `quote` vs `passive` record-keeping links).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ChatRequest'
                - type: object
                  properties:
                    workflow_id:
                      type: string
                    target_agent_id:
                      type: string
                      description: >-
                        Route this turn to the agent with this Docker-style `agent_id`.
                        Resolution priority: `workflow_id` > `target_agent_id` >
                        `agent_profile_id` > default. An unknown id yields an SSE `error` event.
                    disable_delegation:
                      type: boolean
                      default: false
                      description: >-
                        Per-conversation "Solo" mode: suppress ad-hoc delegation for
                        this turn (no `delegate_to` tool, no roster prompt). Ignored
                        when `workflow_id` is set — a team run is delegation.
                    research_mode:
                      type: boolean
                      default: false
                      description: >-
                        Per-conversation "Research Mode": elevated per-turn search
                        budget (`search.research_per_turn_limit`), generous tool-round
                        cap, and a rigorous, evidence-grounded, self-reviewing research
                        prompt that lands a durable cited report in the attached Project.
                        Forces the flat single-agent path (no planner decomposition).
                        Gated server-side by `research.enabled`.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /agent/chat/stream/attach:
    get:
      tags: [Agent]
      operationId: agentChatAttach
      summary: Re-attach to a detached chat run
      description: >-
        Replays the buffered SSE events for a run from the start, then follows live
        until completion. Lets a reopened/closed-then-reopened tab resume an in-flight
        conversation. Emits a `run_missing` event when the run buffer has expired (TTL),
        signalling the client to restore from conversation history instead.
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Missing run_id

  /agent/chat/runs:
    get:
      tags: [Agent]
      operationId: agentChatRuns
      summary: List detached chat runs
      description: >-
        Lists the caller's detached chat runs (newest first), used by recovery
        surfaces (Relay inbox, conversation selector) to find runs whose owning
        tab was closed so they can be re-attached. Runs are indexed per user.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
      responses:
        '200':
          description: List of runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      type: object
                      properties:
                        run_id:
                          type: string
                        status:
                          type: string
                          description: running | done | failed | cancelled
                        message:
                          type: string
                          description: Truncated first-message label
                        session_id:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                        updated_at:
                          type: string
        '405':
          description: GET required

  /agent/chat/runs/{run_id}/cancel:
    post:
      tags: [Agent]
      operationId: agentChatRunCancel
      summary: Cancel a detached chat run
      description: >-
        Cooperative cancel — the detached runner checks the flag at SSE-event
        boundaries and stops pulling from the provider. An **orphaned** run
        (its driver process died mid-run, so no one is left to honor the flag)
        is settled to `cancelled` immediately.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancellation requested (or settled, for orphaned runs)
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  cancel_requested:
                    type: boolean
                  status:
                    type: string
                    nullable: true
                    description: >-
                      Post-cancel status — `cancelled` when settled immediately
                      (orphan), `running` while a live run winds down
                      cooperatively, `null` when the run is unknown/expired.
        '405':
          description: POST required

  /agent/ambassador/brief-turn:
    post:
      tags: [Agent]
      operationId: ambassadorBriefTurn
      summary: Brief one turn with the Ambassador (16.6)
      description: >-
        Start a parallel **Ambassador** briefing of a single conversation turn. The
        ambassador is a dedicated agent (any agent profile with an `ambassador`
        section; the global default is `config.ambassador.profile_id`) that runs
        *parallel* to the conversation and never pollutes it: it reads conversation
        context read-only and writes only to a Redis sidecar (the `ambassador:` key
        prefix), never `conversation_logs`. Runs detached and **un-indexed**
        (`indexed=False`) so it never appears in `/agent/chat/runs`. Returns the
        `run_id`; tail it via `/agent/ambassador/stream`. Cancel via
        `/agent/chat/runs/{run_id}/cancel`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, message_id, assistant_text]
              properties:
                conversation_id:
                  type: string
                message_id:
                  type: string
                  description: Stable client message id the briefing is keyed by
                assistant_text:
                  type: string
                  description: The assistant reply to brief
                user_text:
                  type: string
                  description: The preceding user message (turn prompt), for grounding
                agent_name:
                  type: string
                  description: Display name of the briefed agent, so the briefing speaks of it by name
                artifacts:
                  type: object
                  description: >-
                    What the agent actually did this turn (tools it ran, sources it
                    cited, exhibits it built), compacted client-side, so the briefing
                    grounds on the turn's substance rather than only its prose.
                  properties:
                    tools:
                      type: array
                      items:
                        type: object
                        properties:
                          name: { type: string }
                          detail: { type: string, description: Compact arg summary (query/url/path) }
                          ok: { type: boolean }
                          result: { type: string, description: Truncated result preview }
                    sources:
                      type: array
                      items:
                        type: object
                        properties:
                          label: { type: string }
                          url: { type: string }
                    exhibits:
                      type: array
                      items:
                        type: object
                        properties:
                          kind: { type: string, description: 'table | diagram | choice' }
                          title: { type: string }
                          detail: { type: string }
      responses:
        '200':
          description: Briefing run started
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
        '400':
          description: Missing required fields
        '405':
          description: POST required

  /agent/ambassador/ask:
    post:
      tags: [Agent]
      operationId: ambassadorAsk
      summary: Ask the Ambassador a free-form question (16.6)
      description: >-
        Start a parallel **Ambassador** Q&A run about a conversation. The ambassador
        answers the question grounded only in the conversation (read-only), streaming
        the answer and persisting it to the Redis sidecar under the `qa:` family —
        never `conversation_logs`. Runs detached + un-indexed (`indexed=False`), so it
        never appears in `/agent/chat/runs`. Returns `{run_id, qa_id}`; tail it via
        `/agent/ambassador/stream` (shared `ambassador_*` SSE, keyed by `qa_id`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, question]
              properties:
                conversation_id:
                  type: string
                qa_id:
                  type: string
                  description: Client-stable id the Q&A is keyed by (server generates one if absent)
                question:
                  type: string
                agent_name:
                  type: string
                  description: Display name of the conversation's agent, so the answer names it
                artifacts:
                  type: object
                  description: Latest-turn substance (tools/sources/exhibits), as extra grounding
      responses:
        '200':
          description: Q&A run started
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  qa_id:
                    type: string
        '400':
          description: Missing required fields
        '405':
          description: POST required

  /agent/ambassador/draft:
    post:
      tags: [Agent]
      operationId: ambassadorDraft
      summary: Draft an outbound relay message (16.6)
      description: >-
        The **outbound relay** (you → agent). The ambassador shapes a rough intent
        into a clear, first-person message the user will send to the agent, using the
        conversation for context. Returns `{draft}` for the user to review/edit; the
        ambassador never sends it (the client relays it as a real user turn). Degrades
        gracefully to the raw intent when no provider is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, intent]
              properties:
                conversation_id:
                  type: string
                intent:
                  type: string
                  description: The user's rough intent; shaped into a ready-to-send message
                agent_name:
                  type: string
                artifacts:
                  type: object
                  description: Latest-turn substance, as extra grounding
      responses:
        '200':
          description: Draft produced
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    type: string
        '400':
          description: Missing required fields
        '405':
          description: POST required

  /agent/ambassador/voice-command:
    post:
      tags: [Agent]
      operationId: ambassadorVoiceCommand
      summary: Route a spoken voice command (16.6 voice mode)
      description: >-
        The ambassador **infers intent** from a transcribed voice command: a
        question → it answers (spoken; also persisted to the `qa:` sidecar so the
        Text tab shows it); an instruction for the agent → it drafts a **relay** the
        user reviews and sends; a conversation-management command (rename / archive /
        delete) → it files a **`tool` proposal** the user confirms on screen (the
        write executes only via `PATCH /memory/conversations/{id}/meta` or the
        conversation DELETE after confirmation — nothing runs here). Returns
        `{action, text, qa_id?, tool?}`. Never fails the call — degrades to a spoken
        notice. (`text` for `relay` is a first-person message; the client relays it
        as a real user turn after review — never auto-sent.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, transcript]
              properties:
                conversation_id:
                  type: string
                transcript:
                  type: string
                  description: The transcribed spoken command
                agent_name:
                  type: string
                artifacts:
                  type: object
                  description: Latest-turn substance, for grounding
      responses:
        '200':
          description: Routed command
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum: [answer, relay, tool]
                  text:
                    type: string
                  qa_id:
                    type: string
                    nullable: true
                  tool:
                    type: object
                    description: >-
                      The filed proposal (`tool` action only) — confirm-first,
                      nothing executed yet.
                    properties:
                      proposal_id:
                        type: string
                      action:
                        type: string
                        enum: [rename, archive, unarchive, delete, dispatch]
                      conversation_id:
                        type: string
                        description: >-
                          The target conversation. For `dispatch`, present only when
                          the task should run inside an existing conversation
                          (absent = a new one is minted on confirm).
                      title:
                        type: string
                        description: The proposed title (rename only)
                      agent_id:
                        type: string
                        description: The resolved worker (dispatch only)
                      agent_name:
                        type: string
                        description: The worker's display name (dispatch only)
                      task:
                        type: string
                        description: The self-contained task (dispatch only)
        '400':
          description: Missing required fields
        '405':
          description: POST required

  /agent/ambassador/speak:
    post:
      tags: [Agent]
      operationId: ambassadorSpeak
      summary: Synthesize spoken audio for a briefing / answer (16.6 voice)
      description: >-
        Text-to-speech for the ambassador. Synthesizes spoken audio for a briefing
        summary or Q&A answer via the resolved ambassador's speech model (OpenRouter
        `/audio/speech`) and returns the raw **MP3** bytes (`audio/mpeg`). Model/voice
        precedence: request override → the ambassador profile's `speech_model`/`voice`
        → `config.ambassador.*` → shipped default (`microsoft/mai-voice-2`). The speech
        model is resolved strictly (no chat fallback). Stateless — the client already
        holds the text, so nothing is written to the transcript or sidecar. Degrades to
        a structured `422 {error, code}` (e.g. `voice_unconfigured`) when no OpenRouter
        key is set or the model can't speak.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: The text to speak (a briefing summary or Q&A answer)
                agent_profile_id:
                  type: string
                  description: Ambassador profile whose speech model/voice to use (default ambassador if omitted)
                voice:
                  type: string
                  description: Per-call voice override
                model:
                  type: string
                  description: Per-call speech-model override (provider:model)
      responses:
        '200':
          description: Spoken audio (MP3)
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Missing text
        '405':
          description: POST required
        '422':
          description: Voice unavailable (no speech provider / model can't speak / disabled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string

  /agent/ambassador/transcribe:
    post:
      tags: [Agent]
      operationId: ambassadorTranscribe
      summary: Transcribe push-to-talk voice input (16.6 voice / STT)
      description: >-
        Speech-to-text for the ambassador. Transcribes a push-to-talk recording
        (base64 audio) via the resolved ambassador's STT model (OpenRouter
        `/audio/transcriptions`) and returns `{text}`. The client routes the
        transcript into the reviewable input — it is **never** auto-sent (pre-send
        confirmation). Model precedence: request override → the ambassador profile's
        `transcription_model` → `config.ambassador.transcription_model` → shipped
        default (`openai/whisper-1`), resolved strictly. Degrades to a structured
        `422 {error, code}` (e.g. `transcription_unconfigured`) when no OpenRouter key
        is set or the model can't transcribe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  description: Base64-encoded audio bytes (no data-URI prefix)
                format:
                  type: string
                  description: Audio container token (webm | m4a | ogg | wav | mp3); defaults to webm
                agent_profile_id:
                  type: string
                  description: Ambassador profile whose STT model to use (default ambassador if omitted)
                model:
                  type: string
                  description: Per-call STT-model override (provider:model)
                language:
                  type: string
                  description: Optional ISO-639-1 language hint
      responses:
        '200':
          description: Transcript
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
        '400':
          description: Missing or invalid audio
        '405':
          description: POST required
        '422':
          description: Transcription unavailable (no STT provider / model can't transcribe / disabled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string

  /agent/ambassador/stream:
    get:
      tags: [Agent]
      operationId: ambassadorStream
      summary: Tail an Ambassador briefing run
      description: >-
        Replays then follows a briefing/Q&A run's namespaced SSE events
        (`ambassador_start`, `ambassador_chunk`, `ambassador_done`,
        `ambassador_error`), plus `ambassador_tool_call` / `ambassador_tool_result`
        when the agentic answer core drives its read-only tool belt (rendered as
        tool chips; persisted on the thread entry so they survive a reload). A
        confirmed-write tool (rename/archive/delete a conversation, or a
        `dispatch_task`) additionally emits `ambassador_tool_proposal`
        (`{message_id, tool, proposal: {proposal_id, action, conversation_id?,
        title?, agent_id?, agent_name?, task?}}`) between call and result — the belt
        only FILES the proposal; the client renders a confirm strip and executes it
        via `PATCH /memory/conversations/{id}/meta` (or the conversation DELETE, or
        `POST /agent/ambassador/dispatch` for a dispatch) after the person confirms.
        Emits `run_missing` if the run buffer expired (client falls back to the
        persisted thread from `/agent/ambassador/thread/{thread_id}`).
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Missing run_id

  /agent/ambassador/persona-defaults:
    get:
      tags: [Agent]
      operationId: ambassadorPersonaDefaults
      summary: Shipped default persona text for an ambassador's functional voices
      description: >-
        Returns the code-owned default text for the briefing, Q&A, draft, and
        voice-command-router personas so the ambassador profile editor can show
        and diff overrides (`AmbassadorConfig.{briefing,qa,draft,voice}_persona`).
      responses:
        '200':
          description: Persona defaults
          content:
            application/json:
              schema:
                type: object
                properties:
                  briefing: { type: string }
                  qa: { type: string }
                  draft: { type: string }
                  voice: { type: string }

  /agent/avatar/generate:
    post:
      tags: [Agent]
      operationId: avatarGenerate
      summary: Generate an agent avatar (OpenRouter image model)
      description: >-
        Generates an avatar from the app-level style prompt (Settings → Images, or a
        `style_prompt` override) + the per-request subject prompt, stores it in the user's
        reserved "Home" workspace under `avatars/`, records cost (usage source `image`), and
        returns the served blob URL. Degrades to 422 when images are disabled / OpenRouter is
        unconfigured / the model can't produce an image.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_prompt]
              properties:
                subject_prompt:
                  type: string
                  description: What the avatar should depict (combined with the app style prompt).
                agent_profile_id: { type: string }
                style_prompt: { type: string, description: Override the app-level style prompt. }
                model: { type: string, description: Override the configured image model. }
      responses:
        '200':
          description: Generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  doc_id: { type: string }
                  workspace_id: { type: string }
                  url: { type: string, description: Relative served-blob path for the avatar. }
        '400':
          description: subject_prompt is required
        '422':
          description: Disabled, unconfigured, or generation failed (carries an error code)
  /agent/chat/images:
    post:
      tags: [Agent]
      operationId: chatImageUpload
      summary: Upload an image for vision input
      description: >-
        Stores a user-attached image (multipart `file`) in the reserved "Home" workspace
        under `uploads/` (no text ingestion) and returns a ref to carry in the chat stream's
        `images[]`. Reuses the workspace blob store + per-file/quota policy; types limited to
        png/jpeg/webp/gif. Degrades to 422 when vision is disabled or on a policy failure.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  doc_id: { type: string }
                  workspace_id: { type: string }
                  media_type: { type: string }
                  url: { type: string, description: Relative served-blob path for the image. }
        '400':
          description: No file provided
        '422':
          description: Disabled, unsupported type, too large, or over quota (carries an error code)
  /agent/ambassador/relay:
    post:
      tags: [Agent]
      operationId: ambassadorRelay
      summary: Relay a message into any conversation as a real user turn
      description: >-
        Delivers a relayed message into a conversation as a real **user** turn — even one
        with no open client tab — by running its agent headless via the background-chat
        worker (warm-hydrates, appends the user turn + the agent's reply to the durable
        history). The person is the author; the ambassador never speaks into the transcript.
        The target agent is recovered from the conversation's most recent stamped turn (else
        the default profile). Use for relaying from the command deck or to a conversation the
        ambassador is focused on but isn't open. Returns the background job id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, text]
              properties:
                conversation_id:
                  type: string
                text:
                  type: string
                  description: The message to relay (becomes the user's turn).
      responses:
        '200':
          description: Relay enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job_id:
                    type: string
        '400':
          description: conversation_id and text are required
        '404':
          description: No such conversation
  /agent/ambassador/dispatch:
    post:
      tags: [Agent]
      operationId: ambassadorDispatch
      summary: Dispatch a task to a chosen worker (new or existing conversation)
      description: >-
        The Ambassador write-side: hand a task to a worker (resolved by ``agent_id``;
        agents only) and run it **headless** on the task as a **user** turn. You
        authored the task — the ambassador never speaks into the transcript as itself
        (INV-2). By default a **brand-new conversation** is minted; pass
        ``conversation_id`` to run the task inside an existing conversation instead
        (unknown id → 404, like relay). Returns the ``conversation_id`` so the client
        can open + watch it. Gated by ``config.ambassador.dispatch.enabled`` (default
        on). Confirm-first — reached from the composer's dispatch mode or by
        confirming an ambassador-filed ``dispatch_task`` proposal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, text]
              properties:
                agent_id:
                  type: string
                  description: The worker agent's durable agent_id (agents only).
                text:
                  type: string
                  description: >-
                    The task — lands as your user turn (the new conversation's first,
                    or the next turn of an existing one).
                conversation_id:
                  type: string
                  description: >-
                    Run the task inside this existing conversation instead of minting
                    a new one.
      responses:
        '200':
          description: Dispatch enqueued (the conversation is minted unless one was passed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  conversation_id:
                    type: string
                  job_id:
                    type: string
        '400':
          description: agent_id and text are required, or no such worker agent
        '404':
          description: conversation_id was passed but no such conversation exists
        '422':
          description: Dispatch is disabled in settings
  /agent/ambassador/threads:
    get:
      tags: [Agent]
      operationId: ambassadorThreadsList
      summary: List the user's standalone Ambassador Inquiries (command deck)
      description: >-
        The user's standalone command-deck Inquiries, newest-first — the home
        `deck:{user}` thread (always present, pinned) plus any minted `inq:{user}:{uuid}`
        threads. Chat-bound Inquiries are reached through their conversation, not here.
      responses:
        '200':
          description: The user's Inquiries
          content:
            application/json:
              schema:
                type: object
                properties:
                  threads:
                    type: array
                    items:
                      type: object
                      properties:
                        thread_id: { type: string }
                        title: { type: string }
                        created_at: { type: string, nullable: true }
                        updated_at: { type: string, nullable: true }
                  deck_thread_id:
                    type: string
                    description: The home deck thread id (pin this one first)
    post:
      tags: [Agent]
      operationId: ambassadorThreadCreate
      summary: Mint a new standalone Ambassador Inquiry
      description: >-
        Creates and registers a new standalone Inquiry (`inq:{user}:{uuid}`) under the
        user, for the command deck. Returns its thread id; title is set later via PATCH
        or auto-titled from the first question.
      responses:
        '200':
          description: The new Inquiry
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread_id:
                    type: string
  /agent/ambassador/thread/{thread_id}:
    get:
      tags: [Agent]
      operationId: ambassadorThread
      summary: Replay one Ambassador thread ("Inquiry")
      description: >-
        Replays the unified ambassador thread for a conversation — per-turn briefings
        and free-form Q&A as one ordered list of entries (each with its persisted
        tool-call chips), plus the thread's own title. Replaces the disjoint
        `{briefings, qa}` replay below. `thread_id` defaults to the conversation id.
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thread
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread_id:
                    type: string
                  title:
                    type: string
                    description: The Inquiry's own title ("" → client falls back to the chat title)
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        kind:
                          type: string
                          enum: [briefing, qa]
                        question:
                          type: string
                          description: The prompting question (Q&A entries); empty for briefings
                        content:
                          type: string
                          description: The ambassador's text — the answer (Q&A) or briefing summary
                        status:
                          type: string
                          description: streaming | done | error | empty_provider | cancelled
                        toolCalls:
                          type: array
                          items:
                            type: object
                        message_id:
                          type: string
                          nullable: true
                        run_id:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                        updated_at:
                          type: string
    patch:
      tags: [Agent]
      operationId: ambassadorThreadRename
      summary: Rename an Ambassador thread ("Inquiry")
      description: >-
        Sets the thread's title. An empty title clears it (the client falls back to
        the chat conversation's title).
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        '200':
          description: Renamed
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread_id:
                    type: string
                  title:
                    type: string
    delete:
      tags: [Agent]
      operationId: ambassadorThreadClear
      summary: Clear an Ambassador thread ("Inquiry")
      description: >-
        Wipes the Inquiry — its briefings, answers, and title — from the sidecar.
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread_id:
                    type: string
                  cleared:
                    type: boolean

  /agent/ambassador/{conversation_id}:
    get:
      tags: [Agent]
      operationId: ambassadorBriefings
      summary: Replay a conversation's Ambassador briefings + Q&A (back-compat shim)
      description: >-
        Back-compat shim over the unified thread: replays per-turn briefings and Q&A
        as the old `{briefings, qa}` shape (now projected from the `amb_thread:` entry
        store). New clients use `/agent/ambassador/thread/{thread_id}`.
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Briefings
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation_id:
                    type: string
                  briefings:
                    type: array
                    items:
                      type: object
                      properties:
                        message_id:
                          type: string
                        status:
                          type: string
                          description: streaming | done | error | empty_provider | cancelled
                        summary:
                          type: string
                        error:
                          type: string
                          nullable: true
                        run_id:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                        updated_at:
                          type: string
        '405':
          description: GET required

  /agent/chat/runs/{run_id}/steer:
    post:
      tags: [Agent]
      operationId: agentChatRunSteer
      summary: Live-steer a running chat run
      description: >-
        Fold a message into an in-flight turn without stopping it. The message is
        queued; the streaming tool loop drains it at the next safe boundary (after
        a tool round, or instead of ending) and folds it in as a fresh user turn so
        the agent course-corrects. Owner-only. The message is echoed onto the run's
        event bus as a `steer` event so every connected client shows the steer
        bubble inline.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                mode:
                  type: string
                  enum: [queue]
                  default: queue
      responses:
        '200':
          description: Steer queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  steer_accepted:
                    type: boolean
        '400':
          description: Missing message / invalid body
        '403':
          description: Not the run owner
        '404':
          description: Run not found
        '409':
          description: Run is not active

  /agent/status:
    get:
      tags: [Agent]
      operationId: agentStatus
      summary: Current agent status
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, planning, reasoning, executing, complete, failed, cancelled]

  /agent/plans/cancel:
    post:
      tags: [Agent]
      operationId: agentPlanCancel
      summary: Cancel the active plan execution
      responses:
        '200':
          description: Cancellation requested
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /agent/plans/{plan_id}/status:
    get:
      tags: [Agent]
      operationId: agentPlanStatus
      summary: Read Redis-tracked plan execution state
      description: >
        Returns the live state of a plan from Redis (1h TTL) so a client can
        reconcile a persisted "running" plan after a reload. Returns
        `{ "found": false }` with HTTP 200 when the state has expired, rather
        than 404.
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
        - name: session_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Plan state (or not-found marker)
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  plan_id:
                    type: string
                  session_id:
                    type: string
                  status:
                    type: string
                    description: >
                      active | complete | cancelled | failed | interrupted.
                      active/interrupted are resumable (interrupted = hard-stopped
                      with work left).
                  task:
                    type: string
                  complexity:
                    type: string
                  subtask_count:
                    type: integer
                    nullable: true
                  completed_count:
                    type: integer
                    nullable: true
                  cancel_requested:
                    type: boolean
                  resumable:
                    type: boolean
                    description: >
                      True when the plan is active with non-terminal work left and
                      carries a structural snapshot — POST .../resume would continue it.
                  ttl_seconds:
                    type: integer
                    nullable: true
                    description: >
                      Seconds until the Redis snapshot expires (how long it stays
                      resumable); null when the key is missing or has no expiry.
                  subtasks:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          description: Missing session_id

  /agent/plans/{plan_id}/resume:
    post:
      tags: [Agent]
      operationId: agentPlanResume
      summary: Resume an interrupted plan
      description: >
        Rebuilds the plan from Redis (`PlanStateStore.load_plan`) and continues
        executing only its not-yet-terminal subtasks, streaming Server-Sent Events
        the same way the chat endpoint does (first event `plan_resumed`, then
        subtask events → `plan_complete` → `done`). The run is detached
        (survives client disconnect, re-attachable) and the final synthesis is
        persisted as an assistant turn. Single-agent only for now (alloy plan
        resumption is a follow-up). Returns 404 when the plan is not resumable
        (missing, expired, or already finished).
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
                agent_profile_id:
                  type: string
                model:
                  type: string
                temperature:
                  type: number
                  format: float
                use_memory:
                  type: boolean
                  default: true
      responses:
        '200':
          description: SSE stream of the resumed run
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Missing session_id or invalid JSON
        '404':
          description: Plan not resumable (missing, expired, or already finished)

  /chat/background:
    get:
      tags: [Background Chat]
      operationId: backgroundChatList
      summary: List recent background jobs
      parameters:
