        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tool Outputs]
      operationId: toolOutputDelete
      summary: Delete a stored output
      parameters:
        - $ref: '#/components/parameters/StorageKey'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /workspaces:
    get:
      tags: [Workspaces]
      operationId: workspacesList
      summary: List workspaces
      responses:
        '200':
          description: Workspaces
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workspace'
    post:
      tags: [Workspaces]
      operationId: workspaceCreate
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: '#/components/schemas/Workspace'

  /workspaces/{workspace_id}:
    get:
      tags: [Workspaces]
      operationId: workspaceDetail
      summary: Get a workspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Workspaces]
      operationId: workspaceUpdate
      summary: Update a workspace (rename, description/instructions, shell access)
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  maxLength: 500
                  description: Project description (empty string clears).
                instructions:
                  type: string
                  maxLength: 8000
                  description: Project instructions injected into every turn (empty string clears).
                allow_shell:
                  type: boolean
                shell_backend:
                  type: string
                  enum: [bubblewrap, container]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Workspaces]
      operationId: workspaceDelete
      summary: Delete a workspace (and its documents + blobs)
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{workspace_id}/documents:
    get:
      tags: [Workspaces]
      operationId: workspaceDocumentsList
      summary: List a workspace's document manifest
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkspaceDocument'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Workspaces]
      operationId: workspaceDocumentUpload
      summary: Upload a document (multipart); ingested in the background
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Accepted; ingestion starts in the background (status=pending)
          content:
            application/json:
              schema:
                type: object
                properties:
                  document:
                    $ref: '#/components/schemas/WorkspaceDocument'
        '413':
          description: File too large or workspace quota exceeded
        '415':
          description: Unsupported file type

  /workspaces/{workspace_id}/documents/text:
    post:
      tags: [Workspaces]
      operationId: workspaceDocumentCreateText
      summary: Create a text/markdown document (JSON); ingested in the background
      description: >-
        Creates a durable text document (agent-writable types: md/markdown/txt; the
        filename may carry one folder level, e.g. `research/notes.md`). A filename
        collision returns 409 with the existing document's id — updating is an explicit,
        separate act (`PUT …/documents/{document_id}/text`). Backs the Projects hub
        "New document" action and mirrors the agent's `create_document` tool.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content]
              properties:
                filename:
                  type: string
                  description: e.g. `notes.md` (md/markdown/txt; one optional folder level)
                content:
                  type: string
      responses:
        '201':
          description: Created; ingestion starts in the background (status=pending)
          content:
            application/json:
              schema:
                type: object
                properties:
                  document:
                    $ref: '#/components/schemas/WorkspaceDocument'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Filename already exists in this workspace
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  code: { type: string, enum: [conflict] }
                  document_id: { type: string, description: The existing document's id }
                  current_sha256: { type: string }
        '413':
          description: Content too large or workspace quota exceeded
        '415':
          description: Not an agent-writable text type

  /workspaces/{workspace_id}/documents/{document_id}/text:
    put:
      tags: [Workspaces]
      operationId: workspaceDocumentUpdateText
      summary: Replace a text document's content (JSON); re-ingested in the background
      description: >-
        Full-content replace for md/markdown/txt documents. Pass the last-known
        `expected_sha256` for optimistic concurrency — a mismatch returns 409 with
        `current_sha256`. Identical content is a no-op (no re-ingest). On change the
        document returns to `pending` and re-ingests (chunks, tags, summary refresh);
        the previous blob is deleted only when no other document references it
        (content-addressed dedup). Mirrors the agent's `update_document` tool.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                expected_sha256:
                  type: string
                  description: Optimistic-concurrency check (the sha256 last read)
      responses:
        '200':
          description: Updated (status=pending while re-ingesting; unchanged doc on no-op)
          content:
            application/json:
              schema:
                type: object
                properties:
                  document:
                    $ref: '#/components/schemas/WorkspaceDocument'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: expected_sha256 mismatch (document changed since read)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  code: { type: string, enum: [conflict] }
                  document_id: { type: string }
                  current_sha256: { type: string }
        '413':
          description: Content too large or workspace quota exceeded
        '415':
          description: Not an agent-writable text type

  /workspaces/{workspace_id}/documents/{document_id}:
    get:
      tags: [Workspaces]
      operationId: workspaceDocumentDetail
      summary: Get document metadata
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document
          content:
            application/json:
              schema:
                type: object
                properties:
                  document:
                    $ref: '#/components/schemas/WorkspaceDocument'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Workspaces]
      operationId: workspaceDocumentRename
      summary: Rename a document (base name only)
      description: >-
        Rename the document's base name; the folder prefix and extension are kept, and the
        document id (doc_id) is unchanged — so conversation image references stay valid. 409
        on a filename collision.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: New base name (no path; extension optional).
      responses:
        '200':
          description: Renamed
          content:
            application/json:
              schema:
                type: object
                properties:
                  document:
                    $ref: '#/components/schemas/WorkspaceDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Workspaces]
      operationId: workspaceDocumentDelete
      summary: Delete a document and its blob
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{workspace_id}/documents/{document_id}/raw:
    get:
      tags: [Workspaces]
      operationId: workspaceDocumentRaw
      summary: Serve a document's raw bytes (blob)
      description: >-
        Returns the document's stored bytes with its content-type — the stable URL for
        binary media such as generated agent avatars (held in the reserved "Home"
        workspace). Clients fetch this through the authed API client and object-URL it.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Raw blob bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{workspace_id}/documents/{document_id}/reingest:
    post:
      tags: [Workspaces]
      operationId: workspaceDocumentReingest
      summary: Re-run ingestion for a document (e.g. after a failed embedding under load)
      description: Resets the document to `pending` and re-fires the background pipeline; the stored blob is reused, no re-upload needed. Already-pending documents return 200 unchanged.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '202':
          description: Ingestion re-queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  document:
                    $ref: '#/components/schemas/WorkspaceDocument'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{workspace_id}/avatars/prune:
    post:
      tags: [Workspaces]
      operationId: workspaceAvatarsPrune
      summary: Delete unused avatar files
      description: >-
        Delete every `avatars/`-prefixed file in the workspace (typically Home) that is
        NOT referenced by any agent profile's avatar. Strictly scoped — only avatar files,
        only unused ones. Returns the deleted document ids.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Pruned
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{workspace_id}/conversations:
    get:
      tags: [Workspaces]
      operationId: workspaceConversationsList
      summary: List the project's conversations (durable membership)
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
