          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/BackgroundJob'
    post:
      tags: [Background Chat]
      operationId: backgroundChatEnqueue
      summary: Queue a background conversation
      requestBody:
        required: true
