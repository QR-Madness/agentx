                  type: boolean
      responses:
        '200':
          description: Toggled
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /config:
    get:
      tags: [Config]
      operationId: configGet
      summary: Get runtime configuration (secrets redacted)
      responses:
        '200':
          description: Config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /config/update:
    post:
      tags: [Config]
      operationId: configUpdate
      summary: Update runtime configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  updated:
                    type: array
                    items:
                      type: string

  /config/context-limits:
    get:
      tags: [Config]
      operationId: contextLimits
      summary: Per-model context-window limits
      responses:
        '200':
          description: Context limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextLimits'

components:
  securitySchemes:
    SessionToken:
      type: apiKey
      in: header
      name: X-Auth-Token
      description: >-
        Session token from `/auth/login`. Required on non-public routes only when
        `AGENTX_AUTH_ENABLED=true`.

  parameters:
    ServerName:
      name: name
      in: path
      required: true
      schema:
        type: string
    ProfileId:
      name: profile_id
      in: path
      required: true
      schema:
        type: string
    WorkflowId:
      name: workflow_id
      in: path
      required: true
      schema:
        type: string
    TemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    EntityId:
      name: entity_id
      in: path
      required: true
      schema:
        type: string
    FactId:
      name: fact_id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    JobName:
      name: job_name
      in: path
      required: true
      schema:
        type: string
    StorageKey:
      name: storage_key
      in: path
      required: true
      schema:
        type: string
    ChannelName:
      name: name
      in: path
      required: true
      schema:
        type: string
    ChannelQuery:
      name: channel
      in: query
      required: false
      schema:
        type: string
        default: _all
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Missing required field: text"
        status:
          type: string
          example: error

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        api:
          type: object
          additionalProperties: true
        translation:
          type: object
          additionalProperties: true
        memory:
          type: object
          description: Present only when include_memory=true.
          additionalProperties: true
        version:
          type: string
        protocol_version:
          type: integer

    VersionInfo:
      type: object
      properties:
        version:
          type: string
          example: "0.20.0"
        protocol_version:
          type: integer
          example: 1
        min_client_version:
          type: string
          example: "0.20.0"

    AuthStatus:
      type: object
      properties:
        auth_required:
          type: boolean
        setup_required:
          type: boolean
        auth_bypass_active:
          type: boolean

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        username:
          type: string

    SessionInfo:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        session_created:
          type: string
          format: date-time
        last_active:
          type: string
          format: date-time

    LanguageDetectResult:
      type: object
      properties:
        original:
          type: string
        detected_language:
          type: string
          description: ISO 639-1 code
          example: fr
        confidence:
          type: number
          format: float
          example: 98.5

    TranslateResult:
      type: object
      properties:
        original:
          type: string
        translatedText:
          type: string
        targetLanguage:
          type: string

    McpServer:
      type: object
      properties:
        name:
          type: string
        transport:
          type: string
          enum: [stdio, sse, streamable_http]
        status:
          type: string
        tools:
          type: array
          items:
            type: string
        tools_count:
          type: integer
        resources_count:
          type: integer

    McpTool:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        server:
          type: string
        input_schema:
          type: object
          additionalProperties: true

    McpResource:
      type: object
      properties:
        uri:
          type: string
        name:
          type: string
        server:
          type: string

    Provider:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          example: configured
        models:
          type: array
          items:
            type: string
        error:
          type: string
          nullable: true

    Model:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        context_window:
          type: integer
        supports_tools:
          type: boolean
        supports_vision:
          type: boolean
        supports_streaming:
          type: boolean
        cost_per_1k_input:
          type: number
          format: float
          nullable: true
        cost_per_1k_output:
          type: number
          format: float
          nullable: true

    AgentRunResult:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
        answer:
          type: string
        plan_steps:
          type: integer
        reasoning_steps:
          type: integer
        tools_used:
          type: array
          items:
            type: string
        models_used:
          type: array
          items:
            type: string
        total_tokens:
          type: integer
        total_time_ms:
          type: number
          format: float

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        session_id:
          type: string
        model:
          type: string
        profile_id:
          type: string
        agent_profile_id:
          type: string
        temperature:
          type: number
          format: float
          default: 0.7
        use_memory:
          type: boolean
          default: true

    ChatResponse:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
        response:
          type: string
        answer:
          type: string
        thinking:
          type: string
        has_thinking:
          type: boolean
        session_id:
          type: string
        reasoning_steps:
          type: integer
        total_tokens:
          type: integer
        total_time_ms:
          type: number
          format: float

    BackgroundJob:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, running, complete, failed]
        message:
          type: string
        result:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ToolOutputMeta:
      type: object
      properties:
        storage_key:
          type: string
        tool:
          type: string
        size:
          type: integer
        created_at:
          type: string
          format: date-time

    AgentProfile:
      type: object
      required: [name]
      properties:
        id:
          type: string
        name:
          type: string
        agent_id:
          type: string
          description: Immutable Docker-style identifier (read-only after creation).
        avatar:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        tags:
          type: array
          description: Up to 4 short trait/role labels shown in the agent selector.
          items:
            type: string
        default_model:
          type: string
        temperature:
          type: number
          format: float
        prompt_profile_id:
          type: string
          nullable: true
        system_prompt:
          type: string
          nullable: true
        reasoning_strategy:
          type: string
        enable_memory:
          type: boolean
        memory_channel:
          type: string
        enable_tools:
          type: boolean
        allowed_tools:
          type: array
          nullable: true
          items:
            type: string
        blocked_tools:
          type: array
          items:
            type: string
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    Workflow:
      type: object
      required: [id, name, supervisor_agent_id, members]
      properties:
        id:
          type: string
          description: Kebab-case identifier.
        name:
          type: string
        description:
          type: string
          nullable: true
        supervisor_agent_id:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowMember'
        routes:
          type: array
          description: Declarative routing — schema only in v1, not executed.
          items:
            $ref: '#/components/schemas/WorkflowRoute'
        shared_channel:
          type: string
          description: Auto-derived as `_alloy_{id}` when blank.
        canvas:
          type: object
          description: Opaque Factory editor state; no backend semantics.
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    WorkflowMember:
      type: object
      required: [agent_id, role]
      properties:
        agent_id:
          type: string
        role:
          type: string
          enum: [supervisor, specialist]
        delegation_hint:
          type: string
          nullable: true

    WorkflowRoute:
      type: object
      properties:
        from_agent_id:
          type: string
        to_agent_id:
          type: string
        when:
          type: string

    PromptProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        is_default:
          type: boolean
        sections:
          type: array
          items:
            $ref: '#/components/schemas/PromptSection'

    PromptSection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [persona, task, format, constraints, examples, context, custom, system]
        content:
          type: string
        enabled:
          type: boolean
        order:
          type: integer

    GlobalPrompt:
      type: object
      properties:
        content:
          type: string
        enabled:
          type: boolean

    PromptLayer:
      type: object
      description: One editable block in the layered global-prompt stack.
      properties:
        id:
          type: string
        title:
          type: string
        kind:
          type: string
          enum: [builtin, custom]
        default:
          type: string
          nullable: true
          description: Shipped default (built-ins only); the sidecar
        default_version:
          type: integer
        override:
          type: string
          nullable: true
          description: User edit; null means "use the default"
        base_version:
          type: integer
          nullable: true
        effective:
          type: string
          description: override ?? default — what actually ships
        enabled:
          type: boolean
        order:
          type: integer
        modified:
          type: boolean
        update_available:
          type: boolean
          description: A release changed the default underneath the user's override

    PromptTemplate:
      type: object
      required: [name, content]
      properties:
        id:
          type: string
        name:
          type: string
        content:
          type: string
        default_content:
          type: string
        tags:
          type: array
          items:
            type: string
        placeholders:
          type: array
          items:
            type: string
        type:
          type: string
          enum: [system, user, snippet]
        is_builtin:
          type: boolean
        description:
          type: string
        has_modifications:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    Conversation:
      type: object
      properties:
        conversation_id:
          type: string
        created_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time
        message_count:
          type: integer
        channel:
          type: string
        first_user_message:
          type: string
        last_message:
          type: string

    Message:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
        turn_index:
          type: integer
        timestamp:
          type: string
          format: date-time

    MemoryChannel:
      type: object
      properties:
        name:
          type: string
        is_default:
          type: boolean
        item_counts:
          type: object
          additionalProperties:
            type: integer

    MemoryEntity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        channel:
          type: string
        salience:
          type: number
          format: float
        attributes:
          type: object
          additionalProperties: true

    Fact:
      type: object
      properties:
        id:
          type: string
        claim:
          type: string
        confidence:
          type: number
          format: float
        channel:
          type: string
        temporal_context:
          type: string
          enum: [current, past, future]
        source_turn_id:
          type: string
          nullable: true
        access_count:
          type: integer
        entity_ids:
          type: array
          description: IDs of entities this fact is ABOUT.
          items:
            type: string
        entities:
          type: array
          description: Entities this fact is ABOUT — powers the Mentioned entities section.
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              type: { type: string }

    Strategy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        channel:
          type: string
        success_rate:
          type: number
          format: float

    MemoryStats:
      type: object
      properties:
        totals:
          type: object
          additionalProperties:
            type: integer
        by_channel:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer

    Job:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [idle, running, disabled]
        enabled:
          type: boolean
        last_run:
          type: string
          format: date-time
          nullable: true
        last_duration_ms:
          type: integer
        run_count:
          type: integer

    ContextLimits:
      type: object
      description: Resolved context-window limit per configured model.
      additionalProperties:
        type: integer
