# Model Provider Configuration for AgentX
#
# Provider configurations only. Model capabilities are fetched dynamically
# from provider APIs. Use provider:model format when selecting models.
#
# Examples:
#   anthropic:claude-3-5-sonnet-latest
#   openai:gpt-4-turbo
#   lmstudio:llama3.2
#   openrouter:anthropic/claude-3-opus

providers:
  lmstudio:
    base_url_env: LMSTUDIO_BASE_URL
    timeout: 300.0  # Local models may be slower
    max_retries: 1

  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    timeout: 60.0
    max_retries: 3

  openai:
    api_key_env: OPENAI_API_KEY
    timeout: 60.0
    max_retries: 3

  openrouter:
    api_key_env: OPENROUTER_API_KEY
    timeout: 60.0
    max_retries: 3

# Default models for different use cases
# Use provider:model format
defaults:
  chat: anthropic:claude-3-5-sonnet-latest
  reasoning: anthropic:claude-3-5-sonnet-latest
  code: lmstudio:deepseek-coder-v2
  fast: anthropic:claude-3-5-haiku-latest
  local: lmstudio:llama3.2
