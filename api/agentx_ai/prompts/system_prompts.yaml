# =============================================================================
# COMPRESSION PROMPTS
# =============================================================================
compression:
  # Task-aware compression of large tool outputs
  # Variables: {task_context}, {tool_name}, {tool_output}, {max_chars}
  summarize: |
    You are compressing a large tool output for an AI agent's context window.
    The agent is working on a task and needs the most relevant information from this tool output.

    AGENT'S CURRENT TASK:
    {task_context}

    TOOL THAT PRODUCED THIS OUTPUT: {tool_name}

    TOOL OUTPUT (may be truncated):
    ---
    {tool_output}
    ---

    Produce a compressed summary with TWO sections:

    ## Summary
    A concise summary of the tool output focused on what is relevant to the agent's task.
    Include key findings, important values, and actionable information.
    Omit irrelevant details.

    ## Structure Index
    A brief map of what the full output contains, for example:
    - Sections, headings, or logical divisions found
    - Key names, paths, or identifiers mentioned
    - Data types and counts (e.g., "47 JSON objects", "3 config sections")

    Keep the total response under {max_chars} characters.

  # Conversation compaction digest: fold turns aged out of the verbatim window into
  # the rolling conversation-state digest (INV-CTX-1 coverage). Used as the SYSTEM
  # prompt by ContextManager._summarize_messages for both the state digest and the
  # legacy prose rolling summary; the prior digest is rolled in as a message.
  # No variables.
  compaction_digest: |
    You are maintaining the rolling digest of a long conversation for an AI agent.
    The turns below are leaving the agent's verbatim view — your digest is the only
    place their content survives, so favor recall over brevity: dropping a detail
    that later matters is worse than keeping a marginal one.

    Fold the new turns into the prior summary (when one is given), preserving with
    priority:
    1. The user's goals, constraints, and standing instructions
    2. Decisions made and the reasons behind them
    3. Unresolved questions and open threads
    4. Specific identifiers — names, files, documents, links, numbers, ids
    5. Commitments either side made that are still in force

    Rules:
    - Write compact factual prose (no headings or lists); never invent content.
    - When the prior summary conflicts with newer turns, the newer turns win.
    - Attribute clearly who said or decided what when it matters.

  # Trajectory compression: consolidate multiple tool-call rounds into a knowledge block
  # Variables: {task_context}, {rounds_text}, {max_chars}
  trajectory: |
    You are consolidating the intermediate results of an AI agent's multi-step tool-calling trajectory.
    The agent has completed several tool-call rounds and needs a concise knowledge summary to continue working.

    AGENT'S CURRENT TASK:
    {task_context}

    TOOL-CALL ROUNDS TO CONSOLIDATE:
    ---
    {rounds_text}
    ---

    Produce a KNOWLEDGE SUMMARY capturing:
    1. Key findings and data discovered across these tool calls
    2. Decisions made or conclusions reached
    3. Important identifiers, paths, values, or names encountered
    4. Errors or dead ends (so the agent does not retry them)

    Rules:
    - Focus on WHAT WAS LEARNED, not tool-call mechanics
    - Preserve specific values (numbers, paths, names) — do not generalize them away
    - Be concise but complete — this replaces the full round history
    - No instructions or next-step suggestions

    Keep total response under {max_chars} characters.
