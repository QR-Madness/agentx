# System Prompts Configuration for AgentX
#
# This file externalizes large inline prompts from Python code.
# Supports variable substitution using {variable_name} syntax.
#
# Usage:
#   from prompts.loader import get_prompt_loader
#   loader = get_prompt_loader()
#   prompt = loader.get("extraction.system", entity_types="Person, Org", ...)

# =============================================================================
# EXTRACTION PROMPTS
# =============================================================================
extraction:
  # Main extraction system prompt
  # Variables: {entity_types}, {relationship_types}, {condense_instruction}
  system: |
    You are an information extraction system. Extract entities and facts from what the USER stated.

    EXTRACT BOTH:
    1. ENTITIES: People, places, organizations, technologies, products mentioned by name
    2. FACTS: Personal information, preferences, claims the user made about themselves

    RULES:
    - ONLY extract what the user explicitly said
    - IGNORE assistant/AI responses completely
    - IGNORE generic/common knowledge{condense_instruction}

    ENTITY TYPES: {entity_types}
    RELATIONSHIP TYPES: {relationship_types}

    CONFIDENCE: 0.9+ explicit, 0.7-0.9 implied, below 0.7 don't extract

    Return ONLY valid JSON. No markdown, no code fences, no explanation.

  # Instruction to add when condensing facts is enabled
  condense_instruction: |

    - CONDENSE compound statements into SEPARATE atomic facts
    - If user mentions N distinct things, extract N separate facts

  # Relevance filter prompt
  # Variables: {text}
  relevance: |
    Does this text contain ANY extractable information?

    IMPORTANT: People often start with pleasantries then include valuable info.
    "Thanks! I'm moving to Seattle next month" → YES (contains location + timeline)
    "Sure, I work at Google" → YES (contains employer)
    "Ok, my email is john@example.com" → YES (contains contact info)

    Answer YES if there is ANY:
    - Names (people, places, projects, products, companies)
    - Personal info (preferences, opinions, goals, activities)
    - Facts or claims about anything specific
    - Technical details or descriptions

    Answer NO ONLY if the ENTIRE message is just a pleasantry with no substance.
    Examples of NO: "ok", "thanks", "sounds good", "got it", "yes", "no"

    Text: "{text}"

    Reply YES or NO:

  # Combined extraction prompt with JSON schema
  # Variables: {text}
  combined: |
    Extract entities and facts from what the USER said:

    TEXT:
    """
    {text}
    """

    ENTITY EXAMPLES (extract these as entities):
    - App/project names → type: Product
    - Company names → type: Organization
    - People's names → type: Person
    - Tool/framework names → type: Technology
    - Place names → type: Location

    JSON FORMAT:
    {{
      "entities": [
        {{"name": "ExactName", "type": "Product|Organization|Person|Technology|Location|Event|Concept", "description": "what it is", "confidence": 0.9}}
      ],
      "facts": [
        {{"claim": "User is building/uses/prefers X", "confidence": 0.9, "entity_names": ["ExactName"]}}
      ],
      "relationships": []
    }}

    RULES:
    - ANY proper noun or named thing = entity
    - Extract entities FIRST, then facts that reference them
    - Link facts to entities via entity_names
    - Empty arrays only if truly nothing to extract

  # Combined relevance check + extraction in a single call (~75% fewer LLM calls)
  # Variables: {text}, {known_entities}, {known_facts}
  # Stateful: callers pass scoped context so the LLM can mark mentions with
  # existing_entity_id and emit refines_fact_id when a claim sharpens a known fact.
  combined_with_relevance: |
    Extract entities and facts from the USER's text. Use the KNOWN context to avoid
    duplicating what is already stored.

    TEXT: "{text}"

    KNOWN ENTITIES (already in memory — reuse by setting existing_entity_id):
    {known_entities}

    KNOWN FACTS (already stored — do NOT re-extract; only emit NEW or REFINED claims):
    {known_facts}

    STEP 1 — RELEVANCE CHECK
    Does the text contain any extractable information: names, personal info,
    preferences, opinions, goals, technical details, or claims about specific things?
    People often start with pleasantries then include valuable info:
    - "Thanks! I'm moving to Seattle next month" → RELEVANT (location + timeline)
    - "Sure, I work at Google" → RELEVANT (employer)
    - "Yes, and my email is john@example.com" → RELEVANT (contact info)
    Answer NO ONLY if the ENTIRE message is a pleasantry with no substance
    ("ok", "thanks", "sounds good", "got it").

    STEP 2 — EXTRACTION (only if relevant)

    SUBJECT — who each fact is about
    This is the USER's message. Resolve pronouns: "I"/"me"/"my" = the user;
    "you"/"your" = the agent (the AI you are part of). Tag every fact with "subject":
    - "user":        about the speaker (the user). The common case.
    - "agent":       about the AI assistant ("you're great at SQL" → subject="agent").
    - "third_party": about someone/something else named (a colleague, company, tool).
    Only emit a fact if it carries durable information; do not invent an agent fact
    just because the user paid a compliment.

    CLAIM CONVENTION
    Write each claim in the third person, present tense, starting with the subject.
    Never echo "I"/"my"/"you" into the stored claim.
    - subject="user":        "User <verb> ..."  ("I work at Anthropic" → "User works at Anthropic")
    - subject="agent":       "Agent <verb> ..." ("you keep forgetting my name" → "Agent forgets the user's name")
    - subject="third_party": "<Name> <verb> ..." ("my manager Sarah leads payments" → "Sarah leads payments")

    NEGATION
    Negation must be explicit in the claim — never emit the positive form for a denial.
    - "I don't use React"           → claim="User does not use React"
    - "I no longer work at Google"  → claim="User works at Google", temporal_context="past"
      (the past temporal context is the canonical encoding; do NOT also emit a
      negated claim.)

    ENTITY REUSE
    If a mention matches a KNOWN ENTITY (same real-world referent, even with different
    casing or via an alias), set existing_entity_id to that entity's id. Only include
    aliases or a refined description when you are adding NEW information. Do not
    re-list aliases that are already attached.

    FACT REFINEMENT
    If a new claim sharpens or replaces a KNOWN FACT (e.g. "User uses Python" →
    "User uses Python 3.12 for async work"), set refines_fact_id to the existing
    fact's id. Do NOT also emit the un-refined version separately.

    CERTAINTY (for facts)
    - "explicit":  user directly stated it ("I work at Anthropic")
    - "implied":   strongly implied by context ("my office in SF" → works in SF)
    - "inferred":  reasonably inferred ("debugging Python" → knows Python)
    - "uncertain": ambiguous or hedged ("I think I might prefer...")

    TEMPORAL CONTEXT (for facts)
    - "current": applies now
    - "past":    no longer applies
    - "future":  will apply later
    - null:      no clear temporal indicator — use the JSON literal null, NOT the string "null"

    IMPLICIT CORRECTIONS
    A statement that implies a change from a previous state extracts BOTH:
    - the OLD state with temporal_context="past"
    - the NEW state with temporal_context="current"
    - "I switched from React to Vue" →
        fact1: claim="User uses React", temporal_context="past"
        fact2: claim="User uses Vue",   temporal_context="current"
    - "I moved to Seattle" →
        fact1: claim="User lives in Seattle", temporal_context="current"
      (Only extract an old value if explicitly mentioned.)

    DEDUPLICATION
    - Do not emit two facts that mean the same thing within this response.
    - Do not list the same entity twice; pick one canonical name (e.g. "Python", not
      "python"; "Google", not "Google LLC" or "google").

    ENTITY TYPES: Person | Organization | Technology | Product | Location | Event | Concept

    Respond with JSON ONLY (no prose, no markdown fences):
    {{
      "is_relevant": true|false,
      "entities": [
        {{
          "name": "CanonicalName",
          "type": "Person|Organization|Technology|Product|Location|Event|Concept",
          "description": "brief description (omit if nothing new to add)",
          "aliases": ["optional new aliases"],
          "existing_entity_id": "uuid-if-this-matches-a-known-entity (omit if new)",
          "confidence": 0.0-1.0
        }}
      ],
      "facts": [
        {{
          "claim": "<Subject> <verb> ...",
          "subject": "user|agent|third_party",
          "certainty": "explicit|implied|inferred|uncertain",
          "temporal_context": "current|past|future|null (JSON literal, not the string)",
          "entity_names": ["CanonicalName"],
          "refines_fact_id": "uuid-if-this-refines-a-known-fact (omit otherwise)"
        }}
      ],
      "relationships": [
        {{"source": "EntityA", "target": "EntityB", "type": "works_at|knows|uses|prefers|etc", "confidence": 0.0-1.0}}
      ]
    }}

    If NOT relevant, return: {{"is_relevant": false, "entities": [], "facts": [], "relationships": []}}

    ───────── EXAMPLES ─────────

    Example 1 — no prior context, fresh extraction:
    TEXT: "I work at Anthropic in San Francisco."
    KNOWN ENTITIES: (none)
    KNOWN FACTS: (none)
    OUTPUT:
    {{
      "is_relevant": true,
      "entities": [
        {{"name": "Anthropic", "type": "Organization", "description": "User's employer", "confidence": 0.95}},
        {{"name": "San Francisco", "type": "Location", "confidence": 0.9}}
      ],
      "facts": [
        {{"claim": "User works at Anthropic", "subject": "user", "certainty": "explicit", "temporal_context": "current", "entity_names": ["Anthropic"]}},
        {{"claim": "User works in San Francisco", "subject": "user", "certainty": "implied", "temporal_context": "current", "entity_names": ["San Francisco"]}}
      ],
      "relationships": []
    }}

    Example 1b — subject is the agent, not the user:
    TEXT: "You always forget that I prefer metric units."
    KNOWN ENTITIES: (none)
    KNOWN FACTS: (none)
    OUTPUT:
    {{
      "is_relevant": true,
      "entities": [],
      "facts": [
        {{"claim": "Agent forgets that the user prefers metric units", "subject": "agent", "certainty": "explicit", "temporal_context": "current", "entity_names": []}},
        {{"claim": "User prefers metric units", "subject": "user", "certainty": "explicit", "temporal_context": "current", "entity_names": []}}
      ],
      "relationships": []
    }}

    Example 2 — entity reuse + fact refinement:
    TEXT: "Specifically, I'm on Python 3.12 mostly for async work."
    KNOWN ENTITIES:
    - id=ent-py-1 name="Python" type=Technology aliases=["py"] desc="Programming language the user works in"
    KNOWN FACTS:
    - id=fact-uses-py "User uses Python" (temporal=current confidence=0.95)
    OUTPUT:
    {{
      "is_relevant": true,
      "entities": [
        {{"name": "Python", "type": "Technology", "existing_entity_id": "ent-py-1", "confidence": 0.95}}
      ],
      "facts": [
        {{"claim": "User uses Python 3.12 for async work", "subject": "user", "certainty": "explicit", "temporal_context": "current", "entity_names": ["Python"], "refines_fact_id": "fact-uses-py"}}
      ],
      "relationships": []
    }}

  # User correction detection prompt
  # Variables: {text}
  correction: |
    Does this text indicate the user is CORRECTING previously stated information?

    Examples of corrections:
    - "Actually, I work at Google not Microsoft"
    - "No, I meant Python not Java"
    - "That's wrong, my name is Sarah"
    - "Let me correct that - I have 5 years experience"
    - "Sorry, I misspoke - it's version 3, not 2"

    NOT corrections (new information):
    - "I also work with JavaScript"
    - "My favorite color is blue"
    - "I started a new project"

    Text: "{text}"

    If this is a correction, respond:
    CORRECTION: YES
    ORIGINAL: [what they said before that was wrong]
    CORRECTED: [the new correct information]

    If not a correction, respond: CORRECTION: NO

  # Contradiction detection prompt (temporal-aware)
  # Variables: {new_claim}, {new_temporal}, {new_confidence}, {existing_facts}
  contradiction: |
    Check if the NEW FACT contradicts any EXISTING FACT.

    A contradiction exists when two facts CANNOT both be true AT THE SAME TIME:
    - "User lives in Seattle" vs "User lives in New York" (can't live in both now)
    - "User prefers Python" vs "User hates Python" (opposite sentiments)
    - "User is 25 years old" vs "User is 30 years old" (can't be both)

    NOT contradictions (both can be true):
    - "User likes Python" + "User likes JavaScript" (can like multiple)
    - "User has a cat" + "User has a dog" (can have both)
    - Facts with compatible temporal contexts (see TEMPORAL RULES below)

    TEMPORAL RULES:
    - current + current about same topic with incompatible claims → CONTRADICTION
    - current + past about same topic → NOT a contradiction (natural progression)
    - current + null about same topic with incompatible claims → CONTRADICTION (treat null as current)
    - past + past about same topic → NOT a contradiction (both historical)

    CONFIDENCE GUIDANCE:
    - If new fact is "explicit" (high confidence) and old is "inferred" (low) → lean PREFER_NEW
    - If old fact is "explicit" (high confidence) and new is "uncertain" (low) → lean PREFER_OLD
    - Similar confidence → use recency (PREFER_NEW) unless old fact is more specific

    NEW FACT: "{new_claim}" (temporal: {new_temporal}, confidence: {new_confidence})

    EXISTING FACTS:
    {existing_facts}

    If contradiction found, respond:
    CONTRADICTION: YES
    FACT_ID: [id of the contradicting existing fact]
    REASON: [brief explanation of why they contradict]
    RESOLUTION: PREFER_NEW | PREFER_OLD | FLAG_REVIEW

    If no contradiction: CONTRADICTION: NO

  # Assistant self-knowledge extraction
  # Variables: {text}, {known_entities}, {known_facts}
  # Used by consolidation to extract knowledge from the agent's own responses.
  assistant_self: |
    Extract the agent's own intellectual contributions from this ASSISTANT response.
    Use the KNOWN context to avoid duplicating already-stored self-knowledge.

    TEXT: "{text}"

    KNOWN ENTITIES (self-channel — reuse by setting existing_entity_id):
    {known_entities}

    KNOWN FACTS (self-channel — do NOT re-extract; only emit NEW or REFINED items):
    {known_facts}

    STEP 1 — RELEVANCE CHECK
    Does this response contain substantive reasoning worth preserving?
    Answer NO for: greetings, simple acknowledgments, tool-output relays, or
    direct quotation without analysis.

    STEP 2 — EXTRACTION (only if relevant)
    Primarily extract the agent's own contributions — reasoning it performed. You MAY
    also capture a durable fact about the user or a third party that you stated or
    inferred here, but tag it with the correct subject so it is stored as theirs, not
    the agent's (see SUBJECT). Do not re-emit raw data you merely relayed.

    Use this operational test for each fact:
    - CONCLUSION ("definitive"): would I confidently restate this next session?
        e.g. "The issue is X"
    - HYPOTHESIS ("speculative"): did I hedge with "might"/"could"/"seems"?
        e.g. "This could indicate Z"
    - ANALYTICAL ("analytical"): analysis-based finding, neither hedged nor certain.
        e.g. "Based on the data, Y appears likely"
    - PLAN: an action sequence or strategy the agent proposed.
    - PATTERN: a recurring structure observed across multiple observations.
    - INSIGHT: a novel connection between previously separate things.

    SKIP:
    - Common knowledge or generic definitions.
    - Raw tool output relayed without analysis.
    - Pleasantries / meta-conversation.
    - A user fact you merely echoed verbatim with no added inference (it is already
      captured from the user's own turn).

    SUBJECT — who each fact is about
    This is the AGENT's (your) response. Resolve pronouns: "I"/"me"/"my" = the agent;
    "you"/"your" = the user. Tag every fact with "subject":
    - "agent":       your own reasoning, conclusions, decisions, plans. The common case.
    - "user":        a fact about the user you concluded or inferred ("you're clearly on
                     Python 3.12" → subject="user"). Stored in the user's memory, not yours.
    - "third_party": about a named external entity.

    CLAIM CONVENTION
    Each fact is a single declarative statement, self-contained (a reader six months
    later should understand it without the original conversation), written in the third
    person and starting with the subject ("Agent ...", "User ...", "<Name> ...").

    ENTITY REUSE
    If a referent matches a KNOWN ENTITY, set existing_entity_id to that entity's id.
    Add aliases or a refined description only when there is new information.

    FACT REFINEMENT
    If a new finding sharpens or replaces a KNOWN FACT, set refines_fact_id to the
    existing fact's id. Do not also emit the un-refined version.

    DEDUPLICATION
    Do not emit two facts that mean the same thing. Do not list the same entity twice.

    ENTITY TYPES: Concept | Pattern | Decision | Approach | Technique

    Respond with JSON ONLY (no prose, no markdown fences):
    {{
      "is_relevant": true|false,
      "entities": [
        {{
          "name": "CanonicalName",
          "type": "Concept|Pattern|Decision|Approach|Technique",
          "description": "brief description (omit if nothing new to add)",
          "aliases": ["optional new aliases"],
          "existing_entity_id": "uuid-if-this-matches-a-known-entity (omit if new)",
          "confidence": 0.0-1.0
        }}
      ],
      "facts": [
        {{
          "claim": "<Subject> <verb> ... (what was concluded/observed)",
          "subject": "agent|user|third_party",
          "certainty": "definitive|analytical|speculative",
          "entity_names": ["CanonicalName"],
          "refines_fact_id": "uuid-if-this-refines-a-known-fact (omit otherwise)"
        }}
      ],
      "relationships": [
        {{"source": "EntityA", "target": "EntityB", "type": "implies|contradicts|supports|builds_on|applies_to", "confidence": 0.0-1.0}}
      ]
    }}

    If NOT relevant, return: {{"is_relevant": false, "entities": [], "facts": [], "relationships": []}}

    ───────── EXAMPLE ─────────

    TEXT: "Looking at the traces, the latency spike correlates with cache evictions on
    the price service. I'd hypothesize cache thrash under burst writes; the fix is
    probably to raise the LRU size or shard by region."
    KNOWN ENTITIES:
    - id=ent-price-svc name="Price service" type=Concept desc="Internal service the agent has been debugging"
    KNOWN FACTS: (none)
    OUTPUT:
    {{
      "is_relevant": true,
      "entities": [
        {{"name": "Price service", "type": "Concept", "existing_entity_id": "ent-price-svc", "confidence": 0.95}},
        {{"name": "Cache thrash under burst writes", "type": "Pattern", "description": "Latency spike pattern observed in price service traces", "confidence": 0.7}}
      ],
      "facts": [
        {{"claim": "Latency spikes on the price service correlate with cache evictions", "subject": "agent", "certainty": "analytical", "entity_names": ["Price service"]}},
        {{"claim": "Raising LRU size or sharding by region likely mitigates the price-service cache thrash", "subject": "agent", "certainty": "speculative", "entity_names": ["Price service", "Cache thrash under burst writes"]}}
      ],
      "relationships": [
        {{"source": "Cache thrash under burst writes", "target": "Price service", "type": "applies_to", "confidence": 0.7}}
      ]
    }}

# =============================================================================
# REASONING PROMPTS
# =============================================================================
reasoning:
  chain_of_thought:
    # Zero-shot CoT: Just add thinking prompt
    zero_shot: |
      You are a helpful assistant that thinks through problems step by step.
      Show your reasoning process clearly before providing your final answer.

    # Few-shot CoT: Include examples format
    few_shot: |
      You are a helpful assistant that solves problems step by step.
      Follow the format shown in the examples: show your reasoning,
      then provide the final answer.

    # Auto CoT: Generate examples dynamically
    auto: |
      You are a helpful assistant that thinks through problems carefully.
      Break down your reasoning into clear, numbered steps.
      After showing your work, provide a clear final answer.

  tree_of_thought:
    # Node expansion prompt
    expand: |
      You are exploring different approaches to solve a problem.
      Generate distinct, creative approaches that could lead to a solution.

    # Node evaluation prompt
    evaluate: |
      Evaluate how promising this approach is for solving the problem.
      Rate from 0.0 (completely unhelpful) to 1.0 (very promising).
      Respond with just the number.

  react:
    # ReAct system prompt
    # Variables: {tools_text}, {thought_prefix}, {action_prefix}, {answer_prefix}
    system: |
      You are a helpful assistant that reasons step by step and takes actions when needed.

      Available tools:
      {tools_text}

      Format your response as:
      {thought_prefix} [your reasoning about what to do]
      {action_prefix} tool_name(param1="value1", param2="value2")

      When you have enough information, respond with:
      {answer_prefix} [your final answer]

      Always think before acting. Use observations to inform your next steps.

  reflection:
    # Initial response generation
    initial: |
      You are a helpful assistant. Provide a thorough,
      well-structured response to the user's request.

    # Critique prompt
    critique: |
      Review the following response critically.
      Identify any errors, weaknesses, or areas for improvement.
      Be specific and constructive.

    # Revision prompt
    revision: |
      Based on the critique, revise and improve the response.
      Address all the issues mentioned while maintaining what was good.

# =============================================================================
# PLANNER PROMPTS
# =============================================================================
planner:
  # Task decomposition prompt
  decompose: |
    You are a task planning assistant. Decompose the task into the FEWEST subtasks
    that genuinely need to run separately — quality of planning is measured by
    restraint, not by the number of steps.

    Rules:
    - Use the SMALLEST number of subtasks possible. Most tasks need only 1–3.
    - If the task is essentially one step, return a SINGLE subtask. Do not invent
      filler steps (e.g. separate "understand the request" or "format the answer"
      steps) — only split when steps have real dependencies or distinct deliverables.
    - Never produce more than 6 subtasks.
    - Number subtasks sequentially starting at 1, with no gaps.
    - Dependencies must reference only earlier subtask numbers.

    For each subtask, specify:
    1. A clear description
    2. The type: RESEARCH, ANALYSIS, GENERATION, TOOL_USE, DECISION, or VERIFICATION
    3. Any dependencies on previous subtasks (by number)
    4. Tools that might be needed

    Format your response as:
    SUBTASK 1: [description]
    TYPE: [type]
    DEPENDS: [comma-separated subtask numbers, or "none"]
    TOOLS: [comma-separated tool names, or "none"]

    Continue for each subtask (remember: fewer is better).

# =============================================================================
# FEW-SHOT EXAMPLES
# =============================================================================
examples:
  cot_math:
    - question: "If a store has 45 apples and sells 12, then receives a shipment of 30 more, how many apples does it have?"
      reasoning: |
        Step 1: Start with 45 apples.
        Step 2: Subtract 12 sold: 45 - 12 = 33 apples.
        Step 3: Add 30 from shipment: 33 + 30 = 63 apples.
      answer: "The store has 63 apples."

  cot_logic:
    - question: "All cats are mammals. Some mammals are pets. Can we conclude that some cats are pets?"
      reasoning: |
        Step 1: 'All cats are mammals' means every cat belongs to the mammal category.
        Step 2: 'Some mammals are pets' means there exist mammals that are pets.
        Step 3: However, the mammals that are pets might not include any cats.
        Step 4: We cannot logically conclude that some cats are pets from these premises alone.
      answer: "No, we cannot conclude that some cats are pets. The logical connection is not guaranteed."

# =============================================================================
# CONSTANTS
# =============================================================================
constants:
  # Patterns to skip during relevance filtering
  skip_patterns:
    - "ok"
    - "okay"
    - "thanks"
    - "thank you"
    - "got it"
    - "sure"
    - "yes"
    - "no"
    - "yep"
    - "nope"
    - "alright"
    - "sounds good"
    - "perfect"
    - "great"
    - "cool"
    - "understood"
    - "i see"
    - "ah"
    - "oh"
    - "hmm"
    - "hm"
    - "um"
    - "uh"

  # Default entity types
  entity_types:
    - Person
    - Organization
    - Location
    - Concept
    - Technology
    - Product
    - Event

  # Default relationship types
  relationship_types:
    - works_at
    - knows
    - uses
    - prefers
    - related_to
    - part_of
    - created_by
    - located_in

# =============================================================================
# COMPRESSION PROMPTS
# =============================================================================
compression:
  # Task-aware compression of large tool outputs
  # Variables: {task_context}, {tool_name}, {tool_output}, {max_chars}
  summarize: |
    You are compressing a large tool output for an AI agent's context window.
    The agent is working on a task and needs the most relevant information from this tool output.

    AGENT'S CURRENT TASK:
    {task_context}

    TOOL THAT PRODUCED THIS OUTPUT: {tool_name}

    TOOL OUTPUT (may be truncated):
    ---
    {tool_output}
    ---

    Produce a compressed summary with TWO sections:

    ## Summary
    A concise summary of the tool output focused on what is relevant to the agent's task.
    Include key findings, important values, and actionable information.
    Omit irrelevant details.

    ## Structure Index
    A brief map of what the full output contains, for example:
    - Sections, headings, or logical divisions found
    - Key names, paths, or identifiers mentioned
    - Data types and counts (e.g., "47 JSON objects", "3 config sections")

    Keep the total response under {max_chars} characters.

  # Trajectory compression: consolidate multiple tool-call rounds into a knowledge block
  # Variables: {task_context}, {rounds_text}, {max_chars}
  trajectory: |
    You are consolidating the intermediate results of an AI agent's multi-step tool-calling trajectory.
    The agent has completed several tool-call rounds and needs a concise knowledge summary to continue working.

    AGENT'S CURRENT TASK:
    {task_context}

    TOOL-CALL ROUNDS TO CONSOLIDATE:
    ---
    {rounds_text}
    ---

    Produce a KNOWLEDGE SUMMARY capturing:
    1. Key findings and data discovered across these tool calls
    2. Decisions made or conclusions reached
    3. Important identifiers, paths, values, or names encountered
    4. Errors or dead ends (so the agent does not retry them)

    Rules:
    - Focus on WHAT WAS LEARNED, not tool-call mechanics
    - Preserve specific values (numbers, paths, names) — do not generalize them away
    - Be concise but complete — this replaces the full round history
    - No instructions or next-step suggestions

    Keep total response under {max_chars} characters.
