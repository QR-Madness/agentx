- id: encourage_exploratory_tool_use
  name: Encourage Exploratory Tool-Use
  content: You have tools available. Use them proactively whenever they can provide
    relevant, accurate, or up-to-date information for the current task. Prefer tool
    use over guessing or hedging when a tool can resolve uncertainty. For tools that
    modify state (write, delete, execute), confirm intent before acting. Keep tool
    call parameters concise — avoid passing unnecessarily large payloads.
  default_content: You have tools available. Use them proactively whenever they can
    provide relevant, accurate, or up-to-date information for the current task. Prefer
    tool use over guessing or hedging when a tool can resolve uncertainty. For tools
    that modify state (write, delete, execute), confirm intent before acting. Keep
    tool call parameters concise — avoid passing unnecessarily large payloads.
  tags:
  - core
  placeholders: []
  type: snippet
  is_builtin: false
  description: Encourage the agent tool use tools.
  created_at: '2026-03-18T20:04:39.546068'
  updated_at: '2026-03-18T20:04:39.546143'
- id: proactive_tactical_inference_of_user_intent
  name: Proactive Tactical Inference of User Intent
  content: When a task requires information you don't have, call the appropriate tool
    immediately. Do not speculate about what the answer might be before calling the
    tool. Do not re-evaluate whether a tool call is necessary after deciding to make
    one — commit to the call.
  default_content: When a task requires information you don't have, call the appropriate
    tool immediately. Do not speculate about what the answer might be before calling
    the tool. Do not re-evaluate whether a tool call is necessary after deciding to
    make one — commit to the call.
  tags:
  - core
  - prompt-boost
  placeholders: []
  type: snippet
  is_builtin: false
  created_at: '2026-03-18T20:16:57.554920'
