# docker-compose.gpu.yml
#
# Optional NVIDIA GPU passthrough overlay for the API container.
# Layer this on top of docker-compose.yml when the host has a GPU and the
# NVIDIA Container Toolkit installed:
#
#   Linux:   nvidia-ctk runtime configure --runtime=docker && systemctl restart docker
#   Windows: Docker Desktop + WSL2 backend with NVIDIA GPU support enabled
#            (Settings → Resources → WSL Integration; install the NVIDIA driver
#            for WSL on the Windows host — no driver inside WSL).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile production up -d
#
# Or for a cluster:
#   docker compose -f docker-compose.yml -f docker-compose.gateway.yml -f docker-compose.gpu.yml \
#     --profile production --env-file clusters/<name>/.env up -d
#
# The app resolves its compute device via AGENTX_DEVICE (default "auto" → CUDA when
# torch.cuda.is_available() is true). Both the embedding model and the translation
# models (NLLB-200 + language detection) are moved onto that device, so this overlay
# is all that's needed to put them on the GPU. Verify after start:
#
#   docker exec <cluster>-api python -c "import torch; print(torch.cuda.is_available())"
#   curl -s localhost:<API_PORT>/api/health | jq .compute   # {"device":"cuda","cuda_available":true}
#
# The default Linux torch wheel bundles the CUDA runtime, so the python:3.12-slim
# image works as-is once the NVIDIA Container Toolkit passes the driver through.

services:
  api:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
